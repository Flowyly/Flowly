<!DOCTYPE html>
<html>
<head>
  <title>Create New Password</title>

  <style>

    .top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 30px;
  margin: 20px;

  background: rgba(139, 187, 235, 0.75);

  backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.4);

  border-radius: 20px;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.08);

  transition: all 0.3s ease;
}

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
        background: linear-gradient(
  135deg,
  #dbe4f0,
  #cbdcf5,
  #d6e6f5
);
    }

    /* Background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      
    }

    .shape1 {
      width: 300px;
      height: 300px;
      background: #ffffff;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 300px;
      height: 300px;
      background: #bfdbfe;
      bottom: -50px;
      right: -50px;
    }

    /* Card */
    .container {
  position: relative;
  z-index: 1;

  width: 380px;
  padding: 35px;

  background: rgba(255, 255, 255, 0.92);

  border: 2px solid #bfdbfe;

  border-radius: 20px;

  box-shadow:
    0 15px 35px rgba(59, 130, 246, 0.15);

  text-align: center;

  transition: 0.3s ease;
}

.container:hover {
  transform: translateY(-3px);
}

   h2 {
  color: #1e293b;
  margin-bottom: 10px;
  font-size: 28px;
}

p {
  color: #64748b;
  line-height: 1.5;
}

    p {
      font-size: 14px;
      color: #475569;
    }

   input {
  width: 100%;
  box-sizing: border-box;

  padding: 12px 15px;
  margin: 10px 0;

  border: 2px solid #cbd5e1;
  border-radius: 10px;

  background: #f8fafc;

  font-size: 14px;

  transition: all 0.3s ease;
}

input:focus {
  outline: none;

  border-color: #3b82f6;

  box-shadow:
    0 0 0 4px rgba(59, 130, 246, 0.15);

  background: white;
}

    button {
  width: 100%;
  padding: 12px;

  margin-top: 10px;

  background: linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
  );

  color: white;

  border: none;
  border-radius: 10px;

  font-size: 15px;
  font-weight: bold;

  cursor: pointer;

  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-2px);

  box-shadow:
    0 8px 20px rgba(37, 99, 235, 0.25);
}

    a {
      text-decoration: none;
      color: #3b82f6;
      font-size: 14px;
    }

    .links {
      margin-top: 15px;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    /* Home button */
    .top-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    .home-btn {
      text-decoration: none;
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- Background shapes -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<!-- Home button -->
<div class="top-bar">
  <a href="websitepage.html" class="home-btn">Home</a>
</div>

<!-- Card -->
<div class="container">
  <h2>Create New Password</h2>

  <p>Enter your new password below.</p>

  <form onsubmit="createNewPassword(event)">
    <input type="password" id="newPassword" placeholder="New Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button type="submit">Update Password</button>
  </form>

  <div class="links">
    <p><a href="login1.html">Back to Login</a></p>
  </div>

  <p id="message"></p>
</div>

<script>
function createNewPassword(event) {
  event.preventDefault();

  let newPassword = document.getElementById("newPassword").value;
  let confirmPassword = document.getElementById("confirmPassword").value;

  if (newPassword !== confirmPassword) {
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText = "Passwords do not match!";
    return;
  }

  // Here you would typically send the new password to your server for updating
  document.getElementById("message").style.color = "green";
  document.getElementById("message").innerText = "Password updated successfully !";
  } else {
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText =
      "Email not found!";
  }
}
</script>

</body>
</html>
