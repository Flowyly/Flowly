<!DOCTYPE html>
<html>
<head>
  <title>Create New Password</title>

  <style>
    * {
      box-sizing: border-box;
    }

    .top-bar {
      position: fixed;
      top: 25px;
      left: 25px;
      z-index: 2;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .home-btn {
      text-decoration: none;
      color: #1e3a5f;
      font-size: 15px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .home-btn:hover {
      color: #2563eb;
    }

    body {
      font-family: Arial, sans-serif;
      background: #8fb9d6;
      color: #1f2937;
      min-height: 100vh;
      transition: background 0.3s ease;
    
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
      transition: 0.3s ease;
    }

    .container:hover {
      transform: translateY(-3px);
    }

    h2 {
      color: #1e293b;
      font-size: 30px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #475569;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 2px solid #dbeafe;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
      color: #1f2937;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
      );
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
    }

    a {
      text-decoration: none;
      color: #3b82f6;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
      color: #475569;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }

    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.7;
      z-index: 0;
    }

    .shape1 {
      width: 350px;
      height: 350px;
      background: #c7d7e7;
      top: -100px;
      left: -100px;
    }

    .shape2 {
      width: 350px;
      height: 350px;
      background: #9db8d4;
      bottom: -100px;
      right: -100px;
    }

    /* GLOBAL DARK MODE RULES */
    body.dark-mode {
      background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
                  #0f172a;
      background-attachment: fixed;
    }

    /* Hide background decorative blur shapes in dark mode to preserve canvas contrast */
    body.dark-mode .bg-shape {
      display: none;
    }

    /* Adjust top navigation button container in dark mode */
    body.dark-mode .top-bar {
      background: rgba(15, 23, 42, 0.4);
      border-color: rgba(255, 255, 255, 0.1);
    }

    body.dark-mode .home-btn {
      color: #cbd5e1;
    }

    body.dark-mode .home-btn:hover {
      color: #3b82f6;
    }

    /* Lock down white-theme constraints on the dashboard container card elements */
    body.dark-mode .container {
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
    }

    body.dark-mode h2 {
      color: #1e293b;
    }

    body.dark-mode p {
      color: #475569;
    }

    body.dark-mode input {
      background: #f8fafc;
      color: #1f2937;
    }
  </style>
</head>

<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="top-bar">
    <a href="websitepage.html" class="home-btn">Home</a>
  </div>

  <div class="container">
    <h2>Create New Password</h2>
    <p>Enter your new password below.</p>

    <form onsubmit="createNewPassword(event)">
      <input type="password" id="newPassword" placeholder="New Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit">Update Password</button>
    </form>

    <div class="links">
      <p><a href="login1.html">Back to Login</a></p>
    </div>

    <p id="message"></p>
  </div>

  <script>
  // ===== APPLY SAVED THEME =====
  (function () {
      const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
      const theme = appearance.theme || "Light";
      const fontSize = appearance.fontSize || "Medium";

      if (theme === "Dark") {
          document.body.classList.add("dark-mode");
      } else {
          document.body.classList.remove("dark-mode");
      }

      if (fontSize === "Small") {
          document.body.style.fontSize = "14px";
      } else if (fontSize === "Medium") {
          document.body.style.fontSize = "16px";
      } else if (fontSize === "Large") {
          document.body.style.fontSize = "18px";
      }
  })();

  async function createNewPassword(event) {
    event.preventDefault();

    let newPassword = document.getElementById("newPassword").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let message = document.getElementById("message");

    if (newPassword !== confirmPassword) {
      message.style.color = "red";
      message.innerText = "Passwords do not match!";
      return;
    }

    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    if (!email) {
      message.style.color = "red";
      message.innerText = "Invalid reset link. Missing email.";
      return;
    }

    try {
      const res = await fetch("https://flowly-1-pkxf.onrender.com/reset_password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          new_password: newPassword
        })
      });

      const data = await res.json();

      if (data.success) {
        message.style.color = "green";
        message.innerText = data.message;
        
        setTimeout(() => {
          window.location.href = "login1.html";
        }, 1500);
      } else {
        message.style.color = "red";
        message.innerText = data.message;
      }

    } catch (error) {
      console.log(error);
      message.style.color = "red";
      message.innerText = "Server error.";
    }
  }
  </script>

</body>
</html>
