<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>

  <style>
    * {
      box-sizing: border-box;
    }

    .top-bar {
      position: fixed;
      top: 25px;
      left: 25px;
      z-index: 2;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .home-btn {
      text-decoration: none;
      color: #1e3a5f;
      font-size: 15px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .home-btn:hover {
      color: #2563eb;
    }

    body {
      font-family: Arial, sans-serif;
      background: #8fb9d6;
      color: #1f2937;
      min-height: 100vh;
      transition: background 0.3s ease;
    
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }


    /* Background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }

    .shape1 {
      width: 300px;
      height: 300px;
      background: #ffffff;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 300px;
      height: 300px;
      background: #bfdbfe;
      bottom: -50px;
      right: -50px;
    }

    /* Card */
    .container {
      position: relative;
      z-index: 1;
      width: 380px;
      padding: 35px;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid #bfdbfe;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(59, 130, 246, 0.15);
      text-align: center;
      transition: 0.3s ease;
    }

    .container:hover {
      transform: translateY(-3px);
    }

    h2 {
      color: #1e293b;
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      font-size: 14px;
      color: #475569;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
      color: #1f2937;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
      );
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
    }

    a {
      text-decoration: none;
      color: #3b82f6;
      font-size: 14px;
    }

    .links {
      margin-top: 15px;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    /* GLOBAL DARK MODE RULES */
    body.dark-mode {
      background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
                  #0f172a;
      background-attachment: fixed;
    }

    /* Hide background decorative blur shapes in dark mode */
    body.dark-mode .bg-shape {
      display: none;
    }

    /* Adjust top navigation button container in dark mode */
    body.dark-mode .top-bar {
      background: rgba(15, 23, 42, 0.4);
      border-color: rgba(255, 255, 255, 0.1);
    }

    body.dark-mode .home-btn {
      color: #cbd5e1;
    }

    body.dark-mode .home-btn:hover {
      color: #3b82f6;
    }

    /* Keeping the center card pristine white */
    body.dark-mode .container {
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
    }

    body.dark-mode h2 {
      color: #1e293b;
    }

    body.dark-mode p {
      color: #475569;
    }

    body.dark-mode input {
      background: #f8fafc;
      color: #1f2937;
    }
  </style>
</head>

<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="top-bar">
    <a href="websitepage.html" class="home-btn">Home</a>
  </div>

  <div class="container">
    <h2>Forgot Password</h2>
    <p>Enter your email and we’ll send you a reset link.</p>

    <form onsubmit="resetPassword(event)">
      <input type="email" id="email" placeholder="Email" required>
      <button type="submit">Send Reset Link</button>
    </form>

    <div class="links">
      <p><a href="login1.html">Back to Login</a></p>
    </div>

    <p id="message"></p>
  </div>

  <script>
  // ===== APPLY SAVED THEME =====
  (function () {
      const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
      const theme = appearance.theme || "Light";
      const fontSize = appearance.fontSize || "Medium";

      if (theme === "Dark") {
          document.body.classList.add("dark-mode");
      } else {
          document.body.classList.remove("dark-mode");
      }

      if (fontSize === "Small") {
          document.body.style.fontSize = "14px";
      } else if (fontSize === "Medium") {
          document.body.style.fontSize = "16px";
      } else if (fontSize === "Large") {
          document.body.style.fontSize = "18px";
      }
  })();

  async function resetPassword(event) {
    event.preventDefault();

    let email = document.getElementById("email").value;
    let message = document.getElementById("message");

    message.style.color = "black";
    message.innerText = "Sending reset link...";

    try {
      const res = await fetch("http://127.0.0.1:5000/forgot_password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email })
      });

      const data = await res.json();

      if (data.success) {
        message.style.color = "green";
        message.innerText = data.message;
      } else {
        message.style.color = "red";
        message.innerText = data.message;
      }

    } catch (error) {
      console.log(error);
      message.style.color = "red";
      message.innerText = "Server error. Please try again.";
    }
  }
  </script>

</body>
</html>
