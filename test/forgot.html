<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>

  <style>
  .top-bar {
  position: fixed;
  top: 25px;
  left: 25px;

  z-index: 2;

  padding: 12px 20px;

  background: rgba(255,255,255,0.5);

  backdrop-filter: blur(12px);

  border-radius: 15px;

  border: 1px solid rgba(255,255,255,0.4);
  }
.home-btn {
  text-decoration: none;
  color: #1e3a5f;
  font-size: 15px;
  font-weight: 600;
  }

.home-btn:hover {
  color: #2563eb;
  }
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background: linear-gradient(
    135deg,
    #9fb3c8,
    #b5c7da,
    #c8d8e8
  );

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  position: relative;
  z-index: 1;

  width: 400px;
  padding: 40px;

  background: rgba(255,255,255,0.95);

  border-radius: 24px;

  border: 1px solid rgba(255,255,255,0.5);

  box-shadow:
    0 20px 40px rgba(0,0,0,0.12);

  text-align: center;
}

   h2 {
  color: #1e293b;
  font-size: 30px;
  margin-bottom: 10px;
}

    input {
  width: 100%;
  box-sizing: border-box;

  padding: 12px 15px;
  margin: 10px 0;

  border: 2px solid #dbeafe;
  border-radius: 10px;

  background: #f8fafc;

  font-size: 14px;

  transition: all 0.3s ease;
}

input:focus {
  outline: none;

  border-color: #3b82f6;

  box-shadow:
    0 0 0 4px rgba(59,130,246,0.15);

  background: white;
}

   button {
  width: 100%;
  padding: 12px;

  margin-top: 15px;

  background: linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
  );

  color: white;

  border: none;
  border-radius: 10px;

  font-size: 15px;
  font-weight: bold;

  cursor: pointer;

  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-2px);

  box-shadow:
    0 10px 25px rgba(37,99,235,0.25);
}

    a {
      text-decoration: none;
      color: #3b82f6;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }


    .bg-shape {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.7;
  z-index: 0;
}

.shape1 {
  width: 350px;
  height: 350px;
  background: #c7d7e7;
  top: -100px;
  left: -100px;
}

.shape2 {
  width: 350px;
  height: 350px;
  background: #9db8d4;
  bottom: -100px;
  right: -100px;
}
</style>
</head>

<body>

<!-- Background shapes -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<!-- Home button -->
<div class="top-bar">
  <a href="websitepage.html" class="home-btn">Home</a>
</div>

<!-- Card -->
<div class="container">
  <h2>Forgot Password</h2>

  <p>Enter your email and we’ll send you a reset link.</p>

  <form onsubmit="resetPassword(event)">
    <input type="email" id="email" placeholder="Email" required>
    <button type="submit">Send Reset Link</button>
  </form>

  <div class="links">
    <p><a href="login1.html">Back to Login</a></p>
  </div>

  <p id="message"></p>
</div>

<script>


async function resetPassword(event) {
  event.preventDefault();

  let email = document.getElementById("email").value;
  let message = document.getElementById("message");

  message.style.color = "black";
message.innerText = "Sending reset link...";

  try {
    const res = await fetch("http://127.0.0.1:5000/forgot_password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email
      })
    });

    const data = await res.json();

    if (data.success) {
      message.style.color = "green";
      message.innerText = data.message;
    } else {
      message.style.color = "red";
      message.innerText = data.message;
    }

  } catch (error) {
    console.log(error);

    message.style.color = "red";
    message.innerText = "Server error. Please try again.";
  }
}
</script>

</body>
</html>
