<!DOCTYPE html>
<html>
<head>
  <title>Flowly Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1e1b2e;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 30px;
      margin: 20px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .nav-left { display: flex; align-items: center; gap: 12px; }

    .nav-brand {
      font-weight: 700;
      font-size: 18px;
      color: #a78bfa;
      letter-spacing: 1px;
      margin-right: 10px;
    }

    .admin-badge {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-tabs { display: flex; gap: 6px; margin-left: 10px; }

    .nav-tab {
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      transition: all 0.2s;
    }

    .nav-tab:hover { background: rgba(167,139,250,0.15); color: #a78bfa; }

    .nav-tab.active {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    }

    .nav-right { display: flex; align-items: center; gap: 14px; }

    .admin-name { font-size: 14px; color: #94a3b8; }
    .admin-name span { color: #a78bfa; font-weight: 600; }

    .logout-btn {
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.28); }

    /* ── DELETE BUTTON ── */
    .delete-btn {
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      background: rgba(239,68,68,0.28);
    }

    /* ── PROMOTE BUTTON ── */
    .promote-btn {
      padding: 8px 16px;
      border-radius: 10px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .promote-btn:hover { background: rgba(124,58,237,0.28); }

    /* ── ROLE BADGES ── */
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .badge-admin {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
    }
    .badge-user {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #94a3b8;
    }

    /* ── CREATOR TAG ── */
    .creator-tag {
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 600;
    }
    .creator-tag.unknown {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #64748b;
    }

    /* ── CONTAINER ── */
    .container { padding: 10px 30px 40px; }

    /* ── STAT CARDS ── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }

    .stat-icon { font-size: 28px; }

    .stat-info { display: flex; flex-direction: column; }
    .stat-value { font-size: 28px; font-weight: 700; color: #f1f5f9; }
    .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* ── PANELS ── */
    .panels { display: flex; flex-direction: column; gap: 20px; }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      display: none;
    }
    .panel.active { display: block; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .panel-header h3 { font-size: 16px; font-weight: 600; color: #e2e8f0; }

    .panel-count {
      background: rgba(167,139,250,0.2);
      color: #a78bfa;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ───────── TABLE ───────── */

    table{
        width:100%;
        border-collapse:collapse;
        table-layout:fixed;
    }

    thead tr{
        background:rgba(255,255,255,.04);
    }

    th,
    td{
        padding:13px 16px;
        text-align:left;
        vertical-align:middle;
    }

    th{
        font-size:11px;
        text-transform:uppercase;
        letter-spacing:1px;
        color:#64748b;
        font-weight:600;
    }

    td{
        font-size:14px;
        color:#cbd5e1;
        border-top:1px solid rgba(255,255,255,.05);
    }

    tr:hover td{
        background:rgba(255,255,255,.03);
    }

    /* ---------- Quiz Table Column Widths ---------- */

    #panel-quizzes table th:nth-child(1),
    #panel-quizzes table td:nth-child(1){
        width:6%;
    }

    #panel-quizzes table th:nth-child(2),
    #panel-quizzes table td:nth-child(2){
        width:18%;
    }

    #panel-quizzes table th:nth-child(3),
    #panel-quizzes table td:nth-child(3){
        width:36%;
    }

    #panel-quizzes table th:nth-child(4),
    #panel-quizzes table td:nth-child(4){
        width:15%;
    }

    #panel-quizzes table th:nth-child(5),
    #panel-quizzes table td:nth-child(5){
        width:10%;
        text-align:center;
    }

    #panel-quizzes table th:nth-child(6),
    #panel-quizzes table td:nth-child(6){
        width:15%;
        text-align:center;
    }

    /* Make the table fill the whole panel */

    #usersContent,
    #notesContent,
    #quizzesContent{
        width:100%;
    }

    #usersContent table,
    #notesContent table,
    #quizzesContent table{
        width:100%;
    }

    .note-preview{
        width:100%;
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        color:#94a3b8;
        font-size:13px;
    }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: #475569;
      font-style: italic;
    }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 40px; color: #64748b; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.15);
      color: #e2e8f0;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: rgba(34,197,94,0.4); color: #86efac; }
    #toast.error   { border-color: rgba(239,68,68,0.4);  color: #fca5a5; }

    /* ── CONFIRM MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 900;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }

    .modal {
      background: #1e1b2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 30px;
      width: 340px;
      text-align: center;
    }
    .modal h4 { font-size: 18px; margin-bottom: 10px; color: #f1f5f9; }
    .modal p  { font-size: 14px; color: #94a3b8; margin-bottom: 24px; }

    .modal-btns { display: flex; gap: 12px; justify-content: center; }

    .modal-cancel {
      padding: 10px 22px; border-radius: 10px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #94a3b8; cursor: pointer; font-size: 14px; transition: all 0.2s;
    }
    .modal-cancel:hover { background: rgba(255,255,255,0.14); }

    .modal-confirm {
      padding: 10px 22px; border-radius: 10px;
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4);
      color: #f87171; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s;
    }
    .modal-confirm:hover { background: rgba(239,68,68,0.35); }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-brand">Flowly</div>
    <span class="admin-badge">Admin</span>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab('users', this)">👥 Users</div>
      <div class="nav-tab" onclick="switchTab('notes', this)">📝 Notes</div>
      <div class="nav-tab" onclick="switchTab('quizzes', this)">❓ Quizzes</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="admin-name">Logged in as <span id="adminEmailLabel">Admin</span></div>
    <div class="logout-btn" onclick="logout()">Logout</div>
  </div>
</div>

<!-- CONTAINER -->
<div class="container">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <div class="stat-value" id="statUsers">–</div>
        <div class="stat-label">Total Users</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📝</div>
      <div class="stat-info">
        <div class="stat-value" id="statNotes">–</div>
        <div class="stat-label">Saved Notes</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🎯</div>
      <div class="stat-info">
        <div class="stat-value" id="statQuizzes">–</div>
        <div class="stat-label">Saved Quizzes</div>
      </div>
    </div>
  </div>

  <!-- USERS PANEL -->
  <div class="panel active" id="panel-users">
    <div class="panel-header">
      <h3>All Users</h3>
      <span class="panel-count" id="usersCount">0 users</span>
    </div>
    <div id="usersContent" class="loading">Loading...</div>
  </div>

  <!-- NOTES PANEL -->
  <div class="panel" id="panel-notes">
    <div class="panel-header">
      <h3>Saved Notes</h3>
      <span class="panel-count" id="notesCount">0 notes</span>
    </div>
    <div id="notesContent" class="loading">Loading...</div>
  </div>

  <!-- QUIZZES PANEL -->
  <div class="panel" id="panel-quizzes">
    <div class="panel-header">
      <h3>Saved Quizzes</h3>
      <span class="panel-count" id="quizzesCount">0 quizzes</span>
    </div>
    <div id="quizzesContent" class="loading">Loading...</div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <h4 id="modal-title">Confirm Delete</h4>
    <p id="modal-msg">Are you sure you want to delete this item?</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmDelete()">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const BASE = "https://flowly-1-pkxf.onrender.com";

  // ── AUTH CHECK ──
  const adminEmail = localStorage.getItem("userEmail");
  const isAdmin = localStorage.getItem("is_admin");

  if (!adminEmail || isAdmin !== "1") {
    window.location.href = "login1.html";
  } else {
    document.getElementById("adminEmailLabel").textContent = adminEmail;
  }

  // ── TABS ──
  function switchTab(tab, el) {
    document.querySelectorAll(".nav-tab").forEach(e => e.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(e => e.classList.remove("active"));
    el.classList.add("active");
    document.getElementById(`panel-${tab}`).classList.add("active");
  }

  // ── TOAST ──
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 3000);
  }

  // ── MODAL ──
  let pendingAction = null;

  function openModal(msg, fn, title = "Confirm") {
    document.getElementById("modal-title").textContent = title;
    document.getElementById("modal-msg").textContent = msg;
    document.getElementById("modal-overlay").classList.add("show");
    pendingAction = fn;
  }

  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("show");
    pendingAction = null;
  }

  function confirmDelete() {
    const fn = pendingAction;
    closeModal();
    if (fn) fn();
  }

  // ── CREATOR TAG HELPER ──
  function creatorTag(value) {
    if (!value || value === "Unknown") {
      return `<span class="creator-tag unknown">Unknown</span>`;
    }
    return `<span class="creator-tag">${value}</span>`;
  }

  // ── LOAD USERS ──
  async function loadUsers() {
    try {
      const res = await fetch(`${BASE}/admin/users`);
      const users = await res.json();

      document.getElementById("statUsers").textContent = users.length;
      document.getElementById("usersCount").textContent = `${users.length} user${users.length !== 1 ? "s" : ""}`;

      if (!users.length) {
        document.getElementById("usersContent").innerHTML = `<table><tr class="empty-row"><td>No users found.</td></tr></table>`;
        return;
      }

      const rows = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username || "—"}</td>
          <td>${u.email}</td>
          <td>${u.password || "—"}</td>
          <td><span class="badge ${u.is_admin ? "badge-admin" : "badge-user"}">${u.is_admin ? "Admin" : "User"}</span></td>
          <td style="display:flex; gap:8px; flex-wrap:wrap;">
            ${u.email !== adminEmail ? `
              ${u.is_admin
                ? `<button class="delete-btn" onclick="askDemoteUser(${u.id}, '${u.email}')">Remove Admin</button>`
                : `<button class="promote-btn" onclick="askPromoteUser(${u.id}, '${u.email}')">Make Admin</button>`
              }
              <button class="delete-btn" onclick="askDeleteUser(${u.id}, '${u.email}')">Delete</button>
            ` : `<span style="color:#475569;font-size:13px;">You</span>`}
          </td>
        </tr>
      `).join("");

      document.getElementById("usersContent").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Username</th><th>Email</th><th>Password</th><th>Role</th><th>Action</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (e) {
      document.getElementById("usersContent").innerHTML = `<div class="loading">Failed to load users.</div>`;
    }
  }

  // ── DELETE USER ──
  function askDeleteUser(id, email) {
    openModal(`Delete user "${email}"? This cannot be undone.`, () => deleteUser(id), "Confirm Delete");
  }

  async function deleteUser(id) {
    try {
      const res = await fetch(`${BASE}/admin/delete_user/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (data.success) {
        showToast("User deleted.", "success");
        loadUsers();
      } else {
        showToast(data.message || "Failed to delete user.", "error");
      }
    } catch (e) {
      showToast("Error deleting user.", "error");
    }
  }

  // ── PROMOTE USER ──
  function askPromoteUser(id, email) {
    openModal(`Make "${email}" an admin?`, () => promoteUser(id), "Confirm Promotion");
  }

  async function promoteUser(id) {
    try {
      const res = await fetch(`${BASE}/admin/promote_user/${id}`, { method: "POST" });
      const data = await res.json();
      if (data.success) {
        showToast(data.message, "success");
        loadUsers();
      } else {
        showToast(data.message || "Failed to promote user.", "error");
      }
    } catch (e) {
      showToast("Error promoting user.", "error");
    }
  }

  // ── DEMOTE USER ──
  function askDemoteUser(id, email) {
    openModal(`Remove admin access from "${email}"?`, () => demoteUser(id), "Confirm Removal");
  }

  async function demoteUser(id) {
    try {
      const res = await fetch(`${BASE}/admin/demote_user/${id}`, { method: "POST" });
      const data = await res.json();
      if (data.success) {
        showToast(data.message, "success");
        loadUsers();
      } else {
        showToast(data.message || "Failed to demote user.", "error");
      }
    } catch (e) {
      showToast("Error demoting user.", "error");
    }
  }

  // ── LOAD NOTES ──
  async function loadNotes() {
    try {
      const res = await fetch(`${BASE}/admin/notes`);
      const notes = await res.json();

      document.getElementById("statNotes").textContent = notes.length;
      document.getElementById("notesCount").textContent = `${notes.length} note${notes.length !== 1 ? "s" : ""}`;

      if (!notes.length) {
        document.getElementById("notesContent").innerHTML = `<table><tr class="empty-row"><td>No saved notes found.</td></tr></table>`;
        return;
      }

      const rows = notes.map(n => `
        <tr>
          <td>${n.id}</td>
          <td>${n.subject || "—"}</td>
          <td>${n.topic || "—"}</td>
          <td><div class="note-preview">${n.content.replace(/\n/g, " ")}</div></td>
          <td>${creatorTag(n.created_by)}</td>
          <td><button class="delete-btn" onclick="askDeleteNote(${n.id})">Delete</button></td>
        </tr>
      `).join("");

      document.getElementById("notesContent").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Subject</th><th>Topic</th><th>Preview</th><th>Created By</th><th>Action</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (e) {
      document.getElementById("notesContent").innerHTML = `<div class="loading">Failed to load notes.</div>`;
    }
  }

  function askDeleteNote(id) {
    openModal(`Delete note #${id}? This cannot be undone.`, () => deleteNote(id), "Confirm Delete");
  }

  async function deleteNote(id) {
    try {
      const res = await fetch(`${BASE}/admin/delete_note/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (data.success) {
        showToast("Note deleted.", "success");
        loadNotes();
      } else {
        showToast(data.message || "Failed to delete note.", "error");
      }
    } catch (e) {
      showToast("Error deleting note.", "error");
    }
  }

  // ── LOAD QUIZZES ──
  async function loadQuizzes() {
    try {
      const res = await fetch(`${BASE}/admin/quizzes`);
      const quizzes = await res.json();

      document.getElementById("statQuizzes").textContent = quizzes.length;
      document.getElementById("quizzesCount").textContent = `${quizzes.length} quiz${quizzes.length !== 1 ? "zes" : ""}`;

      if (!quizzes.length) {
        document.getElementById("quizzesContent").innerHTML = `<table><tr class="empty-row"><td>No saved quizzes found.</td></tr></table>`;
        return;
      }

      const rows = quizzes.map(q => `
        <tr>
          <td style="width:5%">${q.id}</td>

          <td style="width:15%">
            ${q.title}
          </td>

          <td style="width:40%">
            <div class="note-preview">
              ${q.content.replace(/\n/g, " ").substring(0, 120)}...
            </div>
          </td>

          <td style="width:15%">
            ${creatorTag(q.created_by)}
          </td>

          <td style="width:10%">
            ${q.marks || "-"}
          </td>

          <td style="width:15%">
            <button class="delete-btn" onclick="askDeleteQuiz(${q.id})">
              Delete
            </button>
          </td>
        </tr>
      `).join("");

      document.getElementById("quizzesContent").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th> <th>Title</th> <th>Preview</th> <th>Created By</th> <th>Marks</th> <th>Action</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (e) {
      document.getElementById("quizzesContent").innerHTML = `<div class="loading">Failed to load quizzes.</div>`;
    }
  }

  function askDeleteQuiz(id) {
    openModal(`Delete quiz #${id}? This cannot be undone.`, () => deleteQuiz(id), "Confirm Delete");
  }

  async function deleteQuiz(id) {
    try {
      const res = await fetch(`${BASE}/admin/delete_quiz/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (data.success) {
        showToast("Quiz deleted.", "success");
        loadQuizzes();
      } else {
        showToast(data.message || "Failed to delete quiz.", "error");
      }
    } catch (e) {
      showToast("Error deleting quiz.", "error");
    }
  }

  // ── LOGOUT ──
  function logout() {
    localStorage.removeItem("userEmail");
    localStorage.removeItem("is_admin");
    localStorage.removeItem("username");
    window.location.href = "login1.html";
  }

  // ── INIT ──
  loadUsers();
  loadNotes();
  loadQuizzes();
</script>
