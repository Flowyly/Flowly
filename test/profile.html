<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #8fb9d6;
      color: #1f2937;
      min-height: 100vh;
      transition: background 0.3s ease;
    }

    /* Ambient Glow Shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
      transition: background 0.4s ease;
    }

    .shape1 {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background: #3b82f6;
    }

    .shape2 {
      bottom: -10%;
      right: -10%;
      width: 45vw;
      height: 45vw;
      background: #60a5fa;
    }

    /* NAVBAR */
    .navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 30px;
  margin: 20px 28px;
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
  transition: all 0.3s ease;
}
    /* LEFT NAV */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* NAV ITEMS */
    .nav-item {
      position: relative;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      color: #334155;
      transition: background 0.25s ease, color 0.25s ease, transform 0.2s ease;
    }

    /* HOVER EFFECT */
    .nav-item:hover {
      background: #dbeafe;
      color: #2563eb;
      transform: translateY(-2px);
    }

    /* ACTIVE PAGE */
    .nav-item.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
    }

    /* CLICKABLE PROFILE TRIGGER */
    .profile-icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #eff6ff;
      font-size: 20px;
      cursor: pointer;
      position: relative;
      transition: background 0.25s ease, transform 0.2s ease;
    }

    .profile-icon:hover {
      background: #dbeafe;
      transform: scale(1.08);
    }

    /* DROPDOWN MENU */
    .profile-menu {
      border: 2px solid black;
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: white;
      border-radius: 19px;
      width: 180px;
      box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      z-index: 10;
      font-size: 15px;
    }

    .profile-menu div {
      padding: 12px;
      cursor: pointer;
      border-radius: 15px;
      color: #1f2937;
      text-align: left;
      font-weight: normal;
    }

    .profile-menu div:hover {
      background: #6fa0d0;
      color: white;
    }

    /* CONTAINER STAYS WHITE */
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 18px;
      border: 2px dashed #93c5fd;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      color: #1f2937;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .avatar {
      text-align: center;
      font-size: 50px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #f8fbff;
      font-size: 14px;
      color: #1f2937;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .section {
      margin-top: 10px;
    }

    #message {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      font-weight: bold;
    }
.profile-wrapper {
  max-width: 980px;
  margin: 40px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 1.5fr 0.9fr;
  gap: 22px;
  align-items: start;
}
.profile-wrapper .container {
  max-width: none;
  margin: 0;
}


.profile-card {
  background: white;
  padding: 30px;
  border-radius: 18px;
  border: 2px dashed #93c5fd;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  color: #1f2937;
}

.profile-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 22px;
  text-align: left;
}

.profile-top .avatar {
  margin-bottom: 0;
}

.profile-subtitle {
  color: #64748b;
  font-size: 14px;
  margin-top: 6px;
}

.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
}

.section h3 {
  margin-bottom: 12px;
  color: #2563eb;
  font-size: 16px;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  background: #f8fbff;
  font-size: 14px;
  color: #1f2937;
}

select:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}

.stats-card {
  background: white;
  padding: 26px;
  border-radius: 18px;
  border: 2px dashed #93c5fd;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.stats-card h3 {
  text-align: center;
  margin-bottom: 18px;
  color: #1f2937;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

.stat-box {
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
}

.stat-box span {
  display: block;
  font-size: 28px;
  font-weight: 800;
  color: #2563eb;
  margin-bottom: 5px;
}

.stat-box p {
  color: #64748b;
  font-size: 14px;
  font-weight: bold;
}

.quick-actions {
  margin-top: 18px;
  display: grid;
  gap: 10px;
}

.quick-actions button {
  margin-top: 0;
}

@media (max-width: 900px) {
  .profile-wrapper {
    grid-template-columns: 1fr;
  }

  .profile-grid {
    grid-template-columns: 1fr;
  }

  .profile-top {
    text-align: center;
    flex-direction: column;
  }
}
    /* ========================================================== */
    /* GLOBAL DARK MODE RULES                                     */
    /* ========================================================== */
    body.dark-mode {
      background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
                  #0f172a;
      background-attachment: fixed;
    }

    /* Adjust ambient glow elements for dark mode */
    body.dark-mode .shape1 { background: #1e3a8a; }
    body.dark-mode .shape2 { background: #312e81; }

    body.dark-mode .profile-menu div {
      color: #1f2937;
    }

    /* WE REMOVED CONTAINER OVERWRITES FROM HERE */
    /* The core container card, labels, inputs, and text stay white */
  </style>
</head>

<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="navbar">
    <div class="nav-left">
      <div class="nav-item" onclick="goHome()">Home</div>
      <div class="nav-item" onclick="goWork()">Work</div>
      <div class="nav-item" onclick="goGenerateQuiz()">Quiz</div>
      <div class="nav-item" onclick="goGenerateNotes()">Notes</div>
    </div>

    <div class="profile-icon" onclick="toggleMenu()">
      👤
      <div class="profile-menu" id="menu">
        <div class="active-menu" onclick="goProfile()">Profile</div>
        <div onclick="goSettings()">Settings</div>
        <div onclick="logout()">Logout</div>
      </div>
    </div>
  </div>

<div class="profile-wrapper">

  <div class="container profile-card">
    <div class="profile-top">
      <div class="avatar">👤</div>
      <div>
        <h2>Profile</h2>
        <p class="profile-subtitle">Manage your student profile and study preferences.</p>
      </div>
    </div>

    <div class="profile-grid">
      <div class="section">
        <h3>Personal Information</h3>

        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Student ID / User ID</label>
        <input type="text" id="studentId" placeholder="Enter your student ID">

       <label>Study Field</label>
<input type="text" id="studyField" placeholder="Example: Cybersecurity">
      </div>

      <div class="section">
        <h3>Study Preferences</h3>

<label>University</label>
<input type="text" id="university" placeholder="Example: MMU / UNITEN">

<label>Daily Study Goal</label>
<select id="studyGoal">
  <option value="">Select daily goal</option>
  <option>15 minutes per day</option>
  <option>30 minutes per day</option>
  <option>45 minutes per day</option>
  <option>1 hour per day</option>
  <option>1 hour 30 minutes per day</option>
  <option>2 hours per day</option>
  <option>3 hours per day</option>
  <option>4 hours per day</option>
</select>

        

        <label>Preferred Study Mode</label>
        <select id="studyMode">
          <option value="">Select study mode</option>
          <option>Notes Only</option>
          <option>Quiz Only</option>
          <option>Notes + Quiz</option>
          <option>Revision Checklist</option>
        </select>

        <label>Favourite Subject</label>
        <input type="text" id="favouriteSubject" placeholder="Example: Network Security">
      </div>
    </div>

    <button onclick="saveProfile()">Save Changes</button>
    <p id="message"></p>
  </div>

  <div class="stats-card">
    <h3>Study Summary</h3>

    <div class="stats-grid">
      <div class="stat-box">
        <span id="notesCount">0</span>
        <p>Subjects</p>
      </div>

      <div class="stat-box">
        <span id="topicsCount">0</span>
        <p>Topics</p>
      </div>

      <div class="stat-box">
        <span id="quizScore">0%</span>
        <p>Last Quiz Score</p>
      </div>
    </div>

    <div class="quick-actions">
      <button type="button" onclick="goGenerateNotes()">Go to Notes</button>
      <button type="button" onclick="goGenerateQuiz()">Go to Quiz</button>
    </div>
  </div>

</div>

  <script>
  // ===== APPLY SAVED THEME =====
  (function() {
      const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
      const theme = appearance.theme || "Default Blue";
      const fontSize = appearance.fontSize || "Medium";

      if (theme === "Dark") {
          document.body.classList.add("dark-mode");
      } else {
          document.body.classList.remove("dark-mode");
      }

      if (fontSize === "Small") document.body.style.fontSize = "14px";
      else if (fontSize === "Medium") document.body.style.fontSize = "16px";
      else if (fontSize === "Large") document.body.style.fontSize = "18px";
  })();

  if (!localStorage.getItem("userEmail")) {
    window.location.href = "login1.html";
  }

  // ===== DROPDOWN TOGGLE =====
  function toggleMenu() {
    const menu = document.getElementById("menu");
    if (menu) {
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }
  }

  document.addEventListener("click", function(event) {
    const profileIcon = document.querySelector(".profile-icon");
    const menu = document.getElementById("menu");

    if (profileIcon && menu && !profileIcon.contains(event.target)) {
      menu.style.display = "none";
    }
  });

  // ===== ROUTING FUNCTIONS =====
  function goHome() { window.location.href = "dashboard.html"; }
  function goWork() { window.location.href = "work.html"; }
  function goGenerateQuiz() { window.location.href = "generatequiz.html"; }
  function goGenerateNotes() { window.location.href = "generatenotes.html"; }
  function goProfile() { window.location.href = "profile.html"; }
  function goSettings() { window.location.href = "settings.html"; }

  function logout() {

    if (!confirm("Are you sure you want to logout?"))
        return;

    localStorage.removeItem("userEmail");
    localStorage.removeItem("username");
    localStorage.removeItem("is_admin");

    window.location.href = "login1.html";
}

  // ===== PROFILE DATA MANAGEMENT =====
  function loadProfile() {
  const savedProfile = JSON.parse(localStorage.getItem("profileSettings")) || {};

  document.getElementById("fullName").value = savedProfile.fullName || "";
  document.getElementById("email").value = savedProfile.email || localStorage.getItem("userEmail") || "";
  document.getElementById("studentId").value = savedProfile.studentId || "";

  document.getElementById("studyField").value = savedProfile.studyField || savedProfile.programme || "";
document.getElementById("university").value = savedProfile.university || "";
document.getElementById("studyGoal").value = savedProfile.studyGoal || "";
document.getElementById("studyMode").value = savedProfile.studyMode || "";
document.getElementById("favouriteSubject").value = savedProfile.favouriteSubject || "";
  loadStudySummary();
}
 function saveProfile() {
  const profileData = {
    fullName: document.getElementById("fullName").value.trim(),
    email: document.getElementById("email").value.trim(),
    studentId: document.getElementById("studentId").value.trim(),

 studyField: document.getElementById("studyField").value.trim(),
university: document.getElementById("university").value.trim(),
studyGoal: document.getElementById("studyGoal").value,
studyMode: document.getElementById("studyMode").value,
favouriteSubject: document.getElementById("favouriteSubject").value.trim()
  };

  localStorage.setItem("profileSettings", JSON.stringify(profileData));

  if (profileData.email) {
    localStorage.setItem("userEmail", profileData.email);
  }

  const message = document.getElementById("message");
  message.style.color = "green";
  message.innerText = "Profile updated successfully.";

  setTimeout(() => {
    message.innerText = "";
  }, 2500);
}
function loadStudySummary() {
  const subjects = JSON.parse(localStorage.getItem("subjects")) || [];

  let topicTotal = 0;
  subjects.forEach(subject => {
    if (Array.isArray(subject.topics)) {
      topicTotal += subject.topics.length;
    }
  });

  const quizScore = localStorage.getItem("quizScore") || "0";

  document.getElementById("notesCount").innerText = subjects.length;
  document.getElementById("topicsCount").innerText = topicTotal;
  document.getElementById("quizScore").innerText = quizScore + "%";
}
  loadProfile();
  </script>

</body>
</html>
