<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e0f2fe);
    }

    /* NAVBAR */
  .navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 30px;
  margin: 20px;

  background: rgba(255, 255, 255, 0.75);

  backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.4);

  border-radius: 20px;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.08);

  transition: all 0.3s ease;
}

/* LEFT NAV */
.nav-left {
  display: flex;
  align-items: center;
  gap: 18px;
}

/* NAV ITEMS */
.nav-item {
  position: relative;

  padding: 10px 18px;

  border-radius: 12px;

  cursor: pointer;

  font-weight: 500;
  color: #334155;

  transition:
    background 0.25s ease,
    color 0.25s ease,
    transform 0.2s ease;
}

/* HOVER EFFECT */
.nav-item:hover {
  background: #dbeafe;

  color: #2563eb;

  transform: translateY(-2px);
}

/* ACTIVE PAGE */
.nav-item.active {
  background: linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
  );

  color: white;

  font-weight: 600;

  box-shadow:
    0 4px 12px rgba(37, 99, 235, 0.35);
}

    .profile-icon {
      font-size: 20px;
      cursor: pointer;
    }

    /* CONTAINER */
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .avatar {
      text-align: center;
      font-size: 50px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .section {
      margin-top: 25px;
    }

    #message {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-item" onclick="goHome()">Home</div>
    <div class="nav-item active">Profile</div>
    
  </div>

  <div class="profile-icon">👤</div>
</div>

<!-- PROFILE -->
<div class="container">
  <div class="avatar">👤</div>
  <h2>Profile</h2>

  <!-- EDIT PROFILE -->
  <div class="section">
    <label>Full Name</label>
<input type="text" id="fullName" placeholder="Enter your full name">

<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">

<label>Student ID / User ID</label>
<input type="text" id="studentId" placeholder="Enter your student ID">

<button onclick="saveProfile()">Save Changes</button>
<p id="message"></p>
  </div>
</div>

<script>
// ===== APPLY SAVED THEME =====
(function() {
    const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
    const theme = appearance.theme || "Default Blue";
    const fontSize = appearance.fontSize || "Medium";

    if (theme === "Default Blue") {
        document.body.style.background = "#8fb9d6";
        document.body.style.color = "#1f2937";
    } else if (theme === "Light") {
        document.body.style.background = "#eaf8ff";
        document.body.style.color = "#1f2937";
    } else if (theme === "Dark") {
        document.body.style.background = "#1e293b";
        document.body.style.color = "#f8fafc";
    }

    if (fontSize === "Small") document.body.style.fontSize = "14px";
    else if (fontSize === "Medium") document.body.style.fontSize = "16px";
    else if (fontSize === "Large") document.body.style.fontSize = "18px";
})();

  if (!localStorage.getItem("userEmail")) {
  window.location.href = "login1.html";
}

function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function loadProfile() {
  const savedProfile = JSON.parse(localStorage.getItem("profileSettings")) || {};

  document.getElementById("fullName").value = savedProfile.fullName || "";
  document.getElementById("email").value = savedProfile.email || localStorage.getItem("userEmail") || "";
  document.getElementById("studentId").value = savedProfile.studentId || "";
}

function saveProfile() {
  const profileData = {
    fullName: document.getElementById("fullName").value.trim(),
    email: document.getElementById("email").value.trim(),
    studentId: document.getElementById("studentId").value.trim()
  };

  localStorage.setItem("profileSettings", JSON.stringify(profileData));

  if (profileData.email) {
    localStorage.setItem("userEmail", profileData.email);
  }

  const message = document.getElementById("message");
  message.style.color = "green";
  message.innerText = "Profile updated successfully.";
}


loadProfile();
</script>

</body>
</html>
