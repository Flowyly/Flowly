<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    /* LIGHT MODE CANVAS (Default) */
    body {
      font-family: Arial, sans-serif;
      background: #8fb9d6;
      color: #1f2937;
      min-height: 100vh;
      transition: background 0.3s ease;
    }

    /* Background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }

    .shape1 {
      width: 300px;
      height: 300px;
      background: #93c5fd;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 300px;
      height: 300px;
      background: #bfdbfe;
      bottom: -50px;
      right: -50px;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 30px;
      margin: 20px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      position: relative;
      z-index: 10;
    }

    /* LEFT NAV */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* NAV ITEMS */
    .nav-item {
      position: relative;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      color: #334155;
      transition:
        background 0.25s ease,
        color 0.25s ease,
        transform 0.2s ease;
    }

    /* HOVER EFFECT */
    .nav-item:hover {
      background: #dbeafe;
      color: #2563eb;
      transform: translateY(-2px);
    }

    /* ACTIVE PAGE */
    .nav-item.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
    }

    /* CLICKABLE PROFILE TRIGGER */
    .profile {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #eff6ff;
      font-size: 20px;
      cursor: pointer;
      position: relative;
      transition: background 0.25s ease, transform 0.2s ease;
    }

    .profile:hover {
      background: #dbeafe;
      transform: scale(1.08);
    }

    /* DROPDOWN MENU */
    .profile-menu {
      border: 2px solid black;
      display: none;
      position: absolute;
      right: 0;
      top: 50px;
      background: white;
      border-radius: 19px;
      width: 180px;
      box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      z-index: 20;
      font-size: 15px;
    }

    .profile-menu div {
      padding: 12px;
      cursor: pointer;
      border-radius: 15px;
      color: #1f2937;
      text-align: left;
      font-weight: normal;
    }

    .profile-menu div:hover {
      background: #6fa0d0;
      color: white;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 40px auto;
      background: white; /* Clean crisp solid white matching core specs */
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }

    h2 {
      color: #1e293b;
      margin-bottom: 20px;
    }

    /* FORM CONTAINERS FOR LAYOUT ADJUSTMENT */
    .form-container {
      display: flex;
      flex-direction: column;
      gap: 0px;
      margin-bottom: 15px;
    }

    .form-row {
      display: flex;
      width: 100%;
    }

    #subject {
      flex: 2;
    }

    #members {
      width: calc(100% - 10px);
    }

    #dueDate {
      flex: 1;
    }

    #status {
      flex: 1;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #f8fafc;
      color: #1f2937;
    }

    button {
      padding: 10px 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    button:hover {
      background: #2563eb;
    }

    /* FIXED TABLE LAYOUT */
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      table-layout: fixed; /* Forces columns to stay structured */
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      color: #1f2937;
      word-wrap: break-word; /* Forces long unbroken words to wrap */
      overflow-wrap: break-word; /* Ensures descriptions stay inside the box */
    }

    /* Giving layout priority proportions so columns stay uniform */
    th:nth-child(1), td:nth-child(1) { width: 20%; } /* Subject */
    th:nth-child(2), td:nth-child(2) { width: 35%; } /* Group Members/Description */
    th:nth-child(3), td:nth-child(3) { width: 15%; } /* Due Date */
    th:nth-child(4), td:nth-child(4) { width: 15%; } /* Status */
    th:nth-child(5), td:nth-child(5) { width: 15%; } /* Action */

    .delete-btn {
      padding: 6px 12px;
      border-radius: 6px;
      background: #ef4444;
      font-weight: normal;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    /* Status colors */
    .status-progress { color: orange; font-weight: 600; }
    .status-review { color: blue; font-weight: 600; }
    .status-complete { color: green; font-weight: 600; }

    /* GLOBAL DARK MODE RULES */
    body.dark-mode {
      background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
                  #0f172a;
      background-attachment: fixed;
    }

    /* Hide background decorative blur shapes in dark mode */
    body.dark-mode .bg-shape {
      display: none;
    }

    /* Enforce robust white structural cards on top of dark ambient canvas */
    body.dark-mode .container {
      background: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    body.dark-mode .profile-menu div {
      color: #1f2937;
    }
  </style>
</head>

<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="navbar">
    <div class="nav-left">
      <div class="nav-item" onclick="goHome()">Home</div>
      <div class="nav-item active" onclick="goWork()">Work</div>
      <div class="nav-item" onclick="goGenerateQuiz()">Quiz</div>
      <div class="nav-item" onclick="goGenerateNotes()">Notes</div>
    </div>

    <div class="profile" onclick="toggleMenu()">
      👤
      <div class="profile-menu" id="menu">
        <div onclick="goProfile()">Profile</div>
        <div onclick="goSettings()">Settings</div>
        <div onclick="logout()">Logout</div>
      </div>
    </div>
  </div>

  <div class="container">
    <h2>Coursework Dashboard</h2>

    <div class="form-container">
      <div class="form-row">
        <input type="text" id="subject" placeholder="Subject Name">
        <input type="date" id="dueDate">
        <select id="status">
          <option value="In Progress">In Progress</option>
          <option value="In Review">In Review</option>
          <option value="Completed">Completed</option>
        </select>
        <button onclick="addCoursework()">Add</button>
      </div>
      <div class="form-row">
        <input type="text" id="members" placeholder="Description">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Subject</th>
          <th>Description</th>
          <th>Due Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
  // ===== APPLY SAVED THEME =====
  (function() {
      const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
      const theme = appearance.theme || "Default Blue";
      const fontSize = appearance.fontSize || "Medium";

      if (theme === "Dark") {
          document.body.classList.add("dark-mode");
      } else {
          document.body.classList.remove("dark-mode");
      }

      if (fontSize === "Small") document.body.style.fontSize = "14px";
      else if (fontSize === "Medium") document.body.style.fontSize = "16px";
      else if (fontSize === "Large") document.body.style.fontSize = "18px";
  })();

  if (!localStorage.getItem("userEmail")) {
    window.location.href = "login1.html";
  }

  let coursework = [];

  /* ================= NAV DROPDOWN TOGGLE ================= */
  function toggleMenu() {
    const menu = document.getElementById("menu");
    if (menu) {
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }
  }

  // Close profile dropdown click safety catcher
  document.addEventListener("click", function(event) {
    const profileTrigger = document.querySelector(".profile");
    const menu = document.getElementById("menu");

    if (profileTrigger && menu && !profileTrigger.contains(event.target)) {
      menu.style.display = "none";
    }
  });

  function goHome() { window.location.href = "dashboard.html"; }
  function goWork() { window.location.href = "work.html"; }
  function goGenerateQuiz() { window.location.href = "generatequiz.html"; }
  function goGenerateNotes() { window.location.href = "generatenotes.html"; }
  function goProfile() { window.location.href = "profile.html"; }
  function goSettings() { window.location.href = "settings.html"; }
  
  function logout() {

    if (!confirm("Are you sure you want to logout?"))
        return;

    localStorage.removeItem("userEmail");
    localStorage.removeItem("username");
    localStorage.removeItem("is_admin");

    window.location.href = "login1.html";
}

  /* ================= LOAD ================= */
  async function loadCoursework() {
    try {
      const userEmail = localStorage.getItem("userEmail");

      const res = await fetch(
  `https://flowly-1-pkxf.onrender.com/coursework?email=${encodeURIComponent(userEmail)}`
);
      const data = await res.json();

      coursework = data;
      displayCoursework();

    } catch (err) {
      console.log("Error loading coursework:", err);
    }
  }

  /* ================= ADD ================= */
  async function addCoursework() {
    const subject = document.getElementById("subject").value.trim();
    const members = document.getElementById("members").value.trim();
    const dueDate = document.getElementById("dueDate").value;
    const status = document.getElementById("status").value;

    if (!subject || !members || !dueDate) {
      alert("Please fill all fields");
      return;
    }

    if (new Date(dueDate) < new Date().setHours(0,0,0,0)) {
      alert("Due date cannot be in the past");
      return;
    }

    try {
      const res = await fetch("https://flowly-1-pkxf.onrender.com/add_coursework", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
    title: subject,
    description: members,
    due_date: dueDate,
    status: status,
    email: localStorage.getItem("userEmail")
})
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById("subject").value = "";
        document.getElementById("members").value = "";
        document.getElementById("dueDate").value = "";
        document.getElementById("status").value = "In Progress";

        loadCoursework();
      } else {
        alert(data.error || "Failed to add coursework");
      }

    } catch (err) {
      console.log("Add error:", err);
    }
  }

  /* ================= DISPLAY ================= */
  function displayCoursework() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    if (!coursework.length) {
      table.innerHTML = `
        <tr>
          <td colspan="5" style="text-align:center; padding: 20px;">No coursework yet</td>
        </tr>
      `;
      return;
    }

    coursework.forEach((c) => {
      let statusClass = "";

      if (c.status === "In Progress") statusClass = "status-progress";
      else if (c.status === "In Review") statusClass = "status-review";
      else if (c.status === "Completed") statusClass = "status-complete";

      table.innerHTML += `
        <tr>
          <td>${c.title}</td>
          <td>${c.description}</td>
          <td>${c.due_date}</td>
          <td class="${statusClass}">${c.status}</td>
          <td>
            <button class="delete-btn" onclick="deleteCoursework(${c.id})">
              Delete
            </button>
          </td>
        </tr>
      `;
    });
  }

  /* ================= DELETE ================= */
  async function deleteCoursework(id) {
    if (!confirm("Delete this coursework?")) return;

    try {
      const userEmail = localStorage.getItem("userEmail");

    await fetch(
  `https://flowly-1-pkxf.onrender.com/delete_coursework/${id}?email=${encodeURIComponent(userEmail)}`,
  {
    method: "DELETE"
  }
   );

      loadCoursework();

    } catch (err) {
      console.log("Delete error:", err);
    }
  }

  /* ================= AUTO LOAD ================= */
  loadCoursework();

  // refresh every 30 seconds
  setInterval(loadCoursework, 30000);
  </script>

</body>
</html>
