<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Notes</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

:root {
    --bg: #8fb9d6;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #64748b;
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --blue-soft: #dbeafe;
    --panel: #f8fbff;
    --line: #93c5fd;
    --danger: #ef4444;
    --danger-dark: #dc2626;
}

html,
body {
    min-height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    background: var(--bg);
    color: var(--text);
}

body {
    margin: 0;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 30px;
    margin: 20px;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 18px;
}

.nav-item {
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
    color: #334155;
    transition: 0.25s ease;
}

.nav-item:hover {
    background: var(--blue-soft);
    color: var(--blue);
    transform: translateY(-2px);
}

.nav-item.active {
    background: linear-gradient(135deg, #3b82f6, var(--blue));
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
}

/* PROFILE - match quiz.html */
.profile {
    position: relative;
    width: 42px;
    height: 42px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;
    background: #eff6ff;

    font-size: 15px;
    cursor: pointer;

    transition:
        background 0.25s ease,
        transform 0.2s ease;
}

.profile:hover {
    background: #dbeafe;
    transform: scale(1.08);
}

.profile-menu {
    font: arial;
    border: 2px solid black;
    display: none;
    position: absolute;
    right: 0;
    top: 42px;

    background: rgb(255, 255, 255);
    border-radius: 19px;
    width: 180px;

    box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.15);
    z-index: 999;
}

.profile-menu div {
    padding: 12px;
    cursor: pointer;
    border-radius: 19px;
}

.profile-menu div:hover {
    background: #6fa0d0;
    color: white;
    border-radius: 19px;
    border: 2px solid black;
}
/* PAGE */
.page-container {
    max-width: 1180px;
    margin: auto;
    padding: 40px 20px;
}

.hero {
    text-align: center;
    margin-bottom: 28px;
}

.hero h1 {
    margin-bottom: 10px;
    font-size: 38px;
}

.flow-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: stretch;
    margin-bottom: 24px;
}

.card {
    background: var(--card);
    border: 2px dashed var(--line);
    border-radius: 15px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.flow-card {
    min-height: 315px;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
}

.upload-card {
    grid-column: 1 / -1;
    min-height: auto;
}

.flow-step {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    margin-right: 8px;
    border-radius: 10px;
    background: var(--blue-soft);
    color: var(--blue);
    font-weight: 800;
}

.notes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
}

#topicsHeading {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0;
    line-height: 1;
}

.selected-subject-inline {
    display: inline-flex;
    align-items: center;
    color: var(--blue);
    font-size: 1em;
    font-weight: 700;
    line-height: 1;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.status-badge {
    background: #e0f2fe;
    color: var(--blue);
    padding: 7px 14px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 13px;
    white-space: nowrap;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    font-size: 14px;
}

input[type="text"],
select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #cfe8f7;
    background: var(--panel);
}

.add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
}

.add-row input {
    flex: 1;
}

button {
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
}

.primary-btn {
    background: var(--blue);
    color: white;
    padding: 12px 18px;
}

.primary-btn:hover {
    background: var(--blue-dark);
}

.secondary-btn {
    background: #e0f2fe;
    color: var(--blue);
    padding: 10px 14px;
}

.secondary-btn:hover {
    background: #c7eafe;
}

.danger-btn {
    background: var(--danger);
    color: white;
}

.danger-btn:hover {
    background: var(--danger-dark);
}

/* CAROUSEL */
.subject-carousel,
.topic-carousel {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 34px;
    align-items: center;
    gap: 10px;
    width: 100%;
    overflow: visible;
}

.subject-strip,
.topic-list {
    grid-column: 2;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    overflow-y: visible;
    scroll-behavior: smooth;
    scroll-snap-type: x proximity;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 12px 0 14px;
    min-width: 0;
}

.subject-strip::-webkit-scrollbar,
.topic-list::-webkit-scrollbar {
    display: none;
}

.scroll-arrow {
    width: 34px;
    height: 34px;
    min-width: 34px;
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.28);
    color: rgba(37, 99, 235, 0.9);
    border: 1px solid rgba(37, 99, 235, 0.18);
    box-shadow: 0 5px 14px rgba(15, 23, 42, 0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 24px;
    line-height: 1;
    z-index: 20;
}

.scroll-arrow:hover {
    background: rgba(255, 255, 255, 0.58);
    color: var(--blue);
    transform: scale(1.04);
}

.subject-card,
.topic-card {
    position: relative;
    flex: 0 0 calc((100% - 24px) / 3);
    max-width: calc((100% - 24px) / 3);
    min-width: 0;
    min-height: 118px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 0;
    padding: 16px 10px 10px;
    border: 1px solid #e5f3ff;
    border-radius: 14px;
    background: var(--panel);
    cursor: pointer;
    scroll-snap-align: start;
    overflow: visible;
    transition: 0.25s ease;
}

.subject-card:hover,
.topic-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
}

.active-card {
    background: #eaf8ff;
    border-color: #72bfd7;
}

.subject-card h3,
.topic-card h3 {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 7px;
    margin: 0 0 6px;
    padding-right: 18px;
    color: var(--text);
    font-size: 14px;
    line-height: 1.2;
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: anywhere;
}

.topic-card h3 {
    min-height: 18px;
    max-height: 34px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.subject-card h3::before,
.topic-card h3::before {
    content: "▣";
    flex: 0 0 22px;
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    background: var(--blue-soft);
    color: var(--blue);
    font-size: 12px;
    line-height: 22px;
}

.muted {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.2;
}

.empty-message {
    flex: 1;
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    background: var(--panel);
    border: 1px solid #e5f3ff;
    border-radius: 12px;
    padding: 14px;
}

.subject-actions,
.topic-actions {
    pointer-events: auto;
    z-index: 30;
}

.subject-actions {
    margin-top: 8px;
    display: flex;
    justify-content: center;
    width: 100%;
}

.subject-delete-btn,
.topic-delete-btn {
    width: 22px;
    height: 22px;
    min-width: 22px;
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border: 2px solid rgba(255,255,255,0.95);
    border-radius: 999px;
    background: rgba(239, 68, 68, 0.92);
    color: white;
    box-shadow: 0 5px 12px rgba(15, 23, 42, 0.20);
    font-size: 0;
    line-height: 1;
    cursor: pointer;
    z-index: 80;
}

.subject-delete-btn::after,
.topic-delete-btn::after {
    content: "×";
    font-size: 16px;
    font-weight: 800;
    line-height: 1;
    transform: translateY(-1px);
}

.subject-delete-btn:hover,
.topic-delete-btn:hover {
    transform: scale(1.08);
    background: var(--danger-dark);
}

.topic-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: 100%;
    margin-top: 0;
}

.topic-actions .secondary-btn {
    width: 100%;
    height: 32px;
    min-height: 32px;
    padding: 7px 6px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.05;
    white-space: normal;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.topic-delete-btn {
    position: absolute;
    top: -7px;
    right: -7px;
}

/* UPLOAD + NOTES */
.upload-row {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.path-box {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 14px;
    padding: 14px;
    color: #1e40af;
    font-weight: bold;
}

.upload-box {
    min-height: 118px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border: 2px dashed #9ddcff;
    background: #f8fcff;
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    transition: 0.3s ease;
}

.upload-box:hover {
    background: #eef8ff;
    border-color: #72bfd7;
}

.upload-box input {
    display: none;
}

.upload-icon {
    font-size: 34px;
}

.file-name-display {
    color: #475569;
    font-size: 14px;
}

.generate-wide-btn {
    width: 100%;
    padding: 14px 18px;
    font-size: 16px;
}

textarea {
    width: 100%;
    min-height: 340px;
    height: auto;
    overflow: hidden;
    resize: none;
    padding: 18px;
    border: none;
    border-radius: 14px;
    background: white;
    box-shadow: inset 0 0 0 1px var(--blue-soft);
    font-size: 15px;
    line-height: 1.7;
}

.button-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
    flex-wrap: wrap;
}

.quiz-cta {
    display: none;
    margin-top: 18px;
    padding: 18px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--blue), #7c3aed);
    color: white;
    box-shadow: 0 12px 28px rgba(37, 99, 235, 0.25);
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
}

.quiz-cta.show {
    display: flex;
}

.quiz-cta button {
    background: white;
    color: var(--blue);
    padding: 12px 18px;
    border-radius: 12px;
    font-weight: bold;
    box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
}

@media (max-width: 900px) {
    .flow-grid {
        grid-template-columns: 1fr;
    }

    .page-container {
        max-width: 100%;
        padding: 28px 16px;
    }

    .nav-left {
        gap: 8px;
        flex-wrap: wrap;
    }
}

@media (max-width: 700px) {
    .subject-carousel,
    .topic-carousel {
        grid-template-columns: 30px minmax(0, 1fr) 30px;
        gap: 8px;
    }

    .scroll-arrow {
        width: 30px;
        height: 30px;
        min-width: 30px;
        min-height: 30px;
        font-size: 21px;
    }

    .subject-card,
    .topic-card {
        flex-basis: calc((100% - 12px) / 2);
        max-width: calc((100% - 12px) / 2);
    }

    .topic-actions .secondary-btn {
        font-size: 10px;
        padding: 6px 4px;
    }
}

/* CLEAN FIX: Subject X button position, no overlapping CSS */
.subject-card {
    position: relative;
    overflow: visible;
}

.subject-actions {
    position: static;
    margin: 0;
    padding: 0;
    width: 0;
    height: 0;
}

.subject-delete-btn {
    position: absolute;
    top: -7px;
    right: -7px;
    z-index: 80;
    width: 22px;
    height: 22px;
    min-width: 22px;
    min-height: 22px;
    padding: 0;
    border-radius: 50%;
    background: rgba(239, 68, 68, 0.92);
    color: #ffffff;
    border: 2px solid rgba(255, 255, 255, 0.95);
    box-shadow: 0 5px 12px rgba(15, 23, 42, 0.20);
    font-size: 0;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    cursor: pointer;
}

.subject-delete-btn::after {
    content: "×";
    font-size: 16px;
    font-weight: 800;
    line-height: 1;
    transform: translateY(-1px);
}

.subject-delete-btn:hover {
    transform: scale(1.08);
    background: #dc2626;
}

/* DARK MODE: background dark, but UI text stays black */
body.dark-mode {
    background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
                #0f172a;

    color: #1f2937;
}

/* Force main readable text to stay black in dark mode */
body.dark-mode .card,
body.dark-mode .card h2,
body.dark-mode .card h3,
body.dark-mode .form-group label,
body.dark-mode .notes-header h2,
body.dark-mode .subject-card,
body.dark-mode .topic-card,
body.dark-mode .subject-card h3,
body.dark-mode .topic-card h3,
body.dark-mode .upload-box h3,
body.dark-mode .path-box,
body.dark-mode textarea,
body.dark-mode input,
body.dark-mode select,
body.dark-mode .profile-menu,
body.dark-mode .profile-menu div {
    color: #1f2937 !important;
}

/* Keep white/soft UI panels unchanged */
body.dark-mode .navbar,
body.dark-mode .card,
body.dark-mode .subject-card,
body.dark-mode .topic-card,
body.dark-mode .upload-box,
body.dark-mode textarea,
body.dark-mode input,
body.dark-mode select,
body.dark-mode .empty-message,
body.dark-mode .profile-menu {
    background-color: #ffffff !important;
}

/* Keep soft inner cards */
body.dark-mode .subject-card,
body.dark-mode .topic-card,
body.dark-mode input,
body.dark-mode select,
body.dark-mode .empty-message {
    background-color: #f8fbff !important;
}

/* Muted text stays readable */
body.dark-mode .muted,
body.dark-mode .empty-message,
body.dark-mode .file-name-display {
    color: #64748b !important;
}

/* Navbar text */
body.dark-mode .nav-item {
    color: #334155 !important;
}

body.dark-mode .nav-item.active {
    color: white !important;
}

/* Blue elements stay blue */
body.dark-mode .flow-step,
body.dark-mode .status-badge,
body.dark-mode .selected-subject-inline,
body.dark-mode .secondary-btn {
    color: #2563eb !important;
}

/* Main buttons stay white text */
body.dark-mode .primary-btn,
body.dark-mode .danger-btn {
    color: white !important;
}

/* Quiz CTA stays readable */
body.dark-mode .quiz-cta,
body.dark-mode .quiz-cta h3 {
    color: white !important;
}

body.dark-mode .quiz-cta button {
    color: #2563eb !important;
}
/* Only AI Study Notes title turns white in dark mode */
body.dark-mode .hero h1 {
    color: #ffffff !important;
}
/* Hide page scrollbar but keep scrolling */
html,
body {
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* Edge lama */
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
    display: none;              /* Chrome, Edge, Safari */
}
/* MATCH GENERATE QUIZ DARK MODE TONE */
body.dark-mode {
    background: #1e293b !important;
    color: #1f2937 !important;
}

/* Navbar ikut Generate Quiz tone */
body.dark-mode .navbar {
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(12px) !important;
    border: 1px solid rgba(255, 255, 255, 0.4) !important;
    border-radius: 20px !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08) !important;
}

/* Nav text same macam quiz */
body.dark-mode .nav-item {
    color: #334155 !important;
}

body.dark-mode .nav-item:hover {
    background: #dbeafe !important;
    color: #2563eb !important;
}

body.dark-mode .nav-item.active {
    background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
    color: white !important;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35) !important;
}

/* Title putih macam Generate Quiz */
body.dark-mode .hero h1 {
    color: #ffffff !important;
}

/* Profile icon ikut quiz tone */
body.dark-mode .profile {
    background: #eff6ff !important;
}

body.dark-mode .profile:hover {
    background: #dbeafe !important;
}
</style>
</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <div class="nav-item" onclick="goHome()">Home</div>
            <div class="nav-item" onclick="goWork()">Work</div>
            <div class="nav-item" onclick="goGenerateQuiz()">Quiz</div>
            <div class="nav-item active" onclick="goGenerateNotes()">Notes</div>
        </div>

        <div class="profile" onclick="toggleMenu()">
            👤
            <div class="profile-menu" id="menu">
                <div onclick="goProfile()">Profile</div>
                <div onclick="goSettings()">Settings</div>
                <div onclick="logout()">Logout</div>
            </div>
        </div>
    </div>

    <main class="page-container">
        <section class="hero">
            <h1>AI Study Notes</h1>
        </section>

        <section class="workspace">
            <section class="flow-grid">
                <div class="card flow-card subject-flow-card">
                    <h2><span class="flow-step">1</span>Subject</h2>

                    <div class="form-group" style="margin-top:14px;">
                        <label>Selected Subject</label>
                        <select id="subjectSelect" onchange="changeSubject()">
                            <option value="">No subject added yet</option>
                        </select>
                    </div>

                    <div class="add-row">
                        <input type="text" id="newSubjectInput" placeholder="Type new subject">
                        <button type="button" class="primary-btn" onclick="addSubject()">Add</button>
                    </div>

                    <div class="subject-carousel">
                        <button type="button" class="scroll-arrow" onclick="scrollSubjectStrip(-1)">‹</button>
                        <div class="subject-strip" id="subjectList"></div>
                        <button type="button" class="scroll-arrow" onclick="scrollSubjectStrip(1)">›</button>
                    </div>
                </div>

                <div class="card flow-card topics-card">
                    <div class="notes-header">
                        <h2 id="topicsHeading"><span class="flow-step">2</span>Topics:<span id="selectedSubjectInline" class="selected-subject-inline"></span></h2>
                        <span class="status-badge" id="topicCount">0 Topics</span>
                    </div>

                    <div class="form-group">
                        <label>Selected Topic</label>
                        <select id="topicSelect" onchange="changeTopic()">
                            <option value="">Select or create topic</option>
                        </select>
                    </div>

                    <div class="add-row">
                        <input type="text" id="newTopicInput" placeholder="Type new topic">
                        <button type="button" class="primary-btn" onclick="addTopic()">Add Topic</button>
                    </div>

                    <div class="topic-carousel">
                        <button type="button" class="scroll-arrow" onclick="scrollTopicStrip(-1)">‹</button>
                        <div class="topic-list" id="topicList"></div>
                        <button type="button" class="scroll-arrow" onclick="scrollTopicStrip(1)">›</button>
                    </div>
                </div>

                <div class="card flow-card upload-card">
                    <h2><span class="flow-step">3</span>Generate Notes</h2>

                    <div class="upload-row">
                        <div class="path-box" id="savePath">No subject selected</div>

                        <div class="upload-box">
                            <div class="upload-icon">📄</div>
                            <h3>PDF</h3>
                            <input type="file" id="fileUpload" accept=".pdf,application/pdf" onchange="showSelectedFile()">
                            <button type="button" class="primary-btn" onclick="document.getElementById('fileUpload').click()">Choose File</button>
                            <p id="fileNameDisplay" class="file-name-display">No file</p>
                        </div>

                        <button type="button" class="primary-btn generate-wide-btn" id="generateBtn" onclick="generateNotes()">Generate Notes</button>
                    </div>
                </div>
            </section>

            <section class="card editor-card">
                <div class="notes-header">
                    <h2>Generated Notes</h2>
                    <span class="status-badge" id="editorStatus">No Topic Selected</span>
                </div>

                <textarea id="notesArea" placeholder="Generated notes..."></textarea>

                <div class="button-row">
                    <button type="button" class="primary-btn" onclick="saveNotesToCurrentTopic()">Save</button>
                    <button type="button" class="secondary-btn" onclick="copyNotes()">Copy</button>
                    <button type="button" class="secondary-btn" onclick="clearEditor()">Clear</button>
                </div>

                <div class="quiz-cta" id="quizCta">
                    <h3>Want to try a quiz?</h3>
                    <button type="button" onclick="startQuizFromNotes()">Start Quiz</button>
                </div>
            </section>
        </section>
    </main>

<script>
(function applySavedTheme() {
    const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
    const theme = appearance.theme || "Default Blue";
    const fontSize = appearance.fontSize || "Medium";

    if (theme === "Dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

    if (fontSize === "Small") document.body.style.fontSize = "14px";
    else if (fontSize === "Medium") document.body.style.fontSize = "16px";
    else if (fontSize === "Large") document.body.style.fontSize = "18px";
})();

function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function goHome() { window.location.href = "dashboard.html"; }
function goWork() { window.location.href = "work.html"; }
function goGenerateQuiz() { window.location.href = "generatequiz.html"; }
function goGenerateNotes() { window.location.href = "generatenotes.html"; }
function goProfile() { window.location.href = "profile.html"; }
function goSettings() { window.location.href = "settings.html"; }
function logout() { window.location.href = "login1.html"; }
function startQuizFromNotes() { window.location.href = "generatequiz.html"; }

const API_BASE_URL = "http://127.0.0.1:5000";
let subjects = loadSubjects();
let selectedSubjectId = localStorage.getItem("selectedSubjectId") || null;
let selectedTopicId = localStorage.getItem("selectedTopicId") || null;

function createId() {
    return Date.now().toString() + Math.random().toString(16).slice(2);
}

function loadSubjects() {
    const saved = JSON.parse(localStorage.getItem("subjects")) || [];

    return saved.map(subject => {
        if (!subject.id) subject.id = createId();
        if (!Array.isArray(subject.topics)) subject.topics = [];

        subject.topics = subject.topics.map(topic => {
            if (typeof topic === "string") {
                return { id: createId(), title: topic, notes: "", fileName: "", updatedAt: "", done: false };
            }

            return {
                id: topic.id || createId(),
                title: topic.title || topic.text || "Untitled Topic",
                notes: topic.notes || "",
                fileName: topic.fileName || "",
                updatedAt: topic.updatedAt || "",
                done: Boolean(topic.done),
                backendId: topic.backendId
            };
        });

        if (subject.notesByTopic) {
            Object.keys(subject.notesByTopic).forEach(topicTitle => {
                let topic = subject.topics.find(item => item.title === topicTitle);
                if (!topic) {
                    topic = { id: createId(), title: topicTitle, notes: "", fileName: "", updatedAt: "", done: false };
                    subject.topics.push(topic);
                }
                topic.notes = subject.notesByTopic[topicTitle];
            });
            delete subject.notesByTopic;
        }

        return {
            id: subject.id,
            name: subject.name || "Untitled Subject",
            topics: subject.topics,
            progress: subject.progress || 0
        };
    });
}

function saveSubjects() {
    localStorage.setItem("subjects", JSON.stringify(subjects));
    localStorage.setItem("selectedSubjectId", selectedSubjectId || "");
    localStorage.setItem("selectedTopicId", selectedTopicId || "");
}

async function loadNotesFromBackend() {
    try {
        const response = await fetch(API_BASE_URL + "/notes");
        const backendNotes = await response.json();
        if (!Array.isArray(backendNotes)) return;

        backendNotes.forEach(note => {
            const subjectName = (note.subject || "Untitled Subject").trim();
            const topicTitle = (note.topic || "Untitled Topic").trim();

            let subject = subjects.find(item => item.name.toLowerCase() === subjectName.toLowerCase());
            if (!subject) {
                subject = { id: createId(), name: subjectName, topics: [], progress: 0 };
                subjects.push(subject);
            }

            let topic = subject.topics.find(item => item.title.toLowerCase() === topicTitle.toLowerCase());
            if (!topic) {
                topic = { id: createId(), title: topicTitle, notes: "", fileName: "Saved in database", updatedAt: "", done: false };
                subject.topics.push(topic);
            }

            if (!topic.backendId || topic.backendId === note.id || !topic.notes) {
                topic.backendId = note.id;
                topic.notes = note.content || "";
                topic.fileName = "Saved in database";
            }
        });

        if (!selectedSubjectId && subjects.length > 0) selectedSubjectId = subjects[0].id;
        renderPage();
    } catch (error) {
        console.error("LOAD NOTES ERROR:", error);
    }
}

async function saveNoteToBackend(subjectName, topicTitle, content) {
    try {
        const response = await fetch(API_BASE_URL + "/save_note", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ subject: subjectName, topic: topicTitle, content })
        });
        return await response.json();
    } catch (error) {
        console.error("SAVE NOTE TO BACKEND ERROR:", error);
        return { success: false };
    }
}

function getSelectedSubject() {
    return subjects.find(subject => subject.id === selectedSubjectId) || null;
}

function getSelectedTopic() {
    const subject = getSelectedSubject();
    return subject ? subject.topics.find(topic => topic.id === selectedTopicId) || null : null;
}

function renderPage() {
    ensureValidSelection();
    renderSubjects();
    renderTopicDropdown();
    renderTopicCards();
    updateSavePath();
    updateEditorStatus();
    updateTopicsHeading();
    saveSubjects();
    autoResizeNotesEditor();
}

function ensureValidSelection() {
    if (subjects.length === 0) {
        selectedSubjectId = null;
        selectedTopicId = null;
        return;
    }

    if (!getSelectedSubject()) selectedSubjectId = subjects[0].id;

    const subject = getSelectedSubject();
    if (!subject || subject.topics.length === 0) {
        selectedTopicId = null;
        return;
    }

    if (!getSelectedTopic()) selectedTopicId = subject.topics[0].id;
}

function updateTopicsHeading() {
    const holder = document.getElementById("selectedSubjectInline");
    const subject = getSelectedSubject();
    holder.textContent = subject ? subject.name : "";
}

function renderSubjects() {
    const subjectList = document.getElementById("subjectList");
    const subjectSelect = document.getElementById("subjectSelect");
    subjectList.innerHTML = "";
    subjectSelect.innerHTML = "";

    if (subjects.length === 0) {
        subjectList.innerHTML = "<p class='empty-message'>No subject</p>";
        subjectSelect.innerHTML = "<option value=''>No subject</option>";
        return;
    }

    subjects.forEach(subject => {
        const totalTopics = subject.topics.length;
        const completedTopics = subject.topics.filter(topic => topic.done).length;
        subject.progress = totalTopics === 0 ? 0 : Math.round((completedTopics / totalTopics) * 100);

        const card = document.createElement("div");
        card.className = "subject-card" + (subject.id === selectedSubjectId ? " active-card" : "");
        card.innerHTML = `
            <h3>${escapeHTML(subject.name)}</h3>
            <p class="muted">${totalTopics}${totalTopics === 1 ? " topic" : " topics"}</p>
            <div class="subject-actions">
                <button type="button" class="subject-delete-btn" aria-label="Delete subject"></button>
            </div>
        `;

        card.addEventListener("click", event => {
            if (event.target.closest("button")) return;
            selectedSubjectId = subject.id;
            selectedTopicId = subject.topics[0] ? subject.topics[0].id : null;
            document.getElementById("notesArea").value = getSelectedTopic() ? getSelectedTopic().notes : "";
            renderPage();
        });

        card.querySelector(".subject-delete-btn").addEventListener("click", event => {
            event.stopPropagation();
            deleteSubject(subject.id);
        });

        subjectList.appendChild(card);

        const option = document.createElement("option");
        option.value = subject.id;
        option.textContent = subject.name;
        subjectSelect.appendChild(option);
    });

    subjectSelect.value = selectedSubjectId || "";
}

function renderTopicDropdown() {
    const topicSelect = document.getElementById("topicSelect");
    const subject = getSelectedSubject();
    topicSelect.innerHTML = "";

    if (!subject) {
        topicSelect.innerHTML = "<option value=''>Select subject first</option>";
        return;
    }

    if (subject.topics.length === 0) {
        topicSelect.innerHTML = "<option value=''>No topic</option>";
        return;
    }

    subject.topics.forEach(topic => {
        const option = document.createElement("option");
        option.value = topic.id;
        option.textContent = topic.title;
        topicSelect.appendChild(option);
    });

    topicSelect.value = selectedTopicId || "";
}

function renderTopicCards() {
    const topicList = document.getElementById("topicList");
    const topicCount = document.getElementById("topicCount");
    const subject = getSelectedSubject();
    topicList.innerHTML = "";

    if (!subject) {
        topicCount.textContent = "0 Topics";
        topicList.innerHTML = "<p class='empty-message'>Select subject first</p>";
        return;
    }

    topicCount.textContent = subject.topics.length + (subject.topics.length === 1 ? " Topic" : " Topics");

    if (subject.topics.length === 0) {
        topicList.innerHTML = "<p class='empty-message'>No topic</p>";
        return;
    }

    subject.topics.forEach(topic => {
        const card = document.createElement("div");
        card.className = "topic-card" + (topic.id === selectedTopicId ? " active-card" : "");
        card.innerHTML = `
            <h3>${escapeHTML(topic.title)}</h3>
            <div class="topic-actions">
                <button type="button" class="secondary-btn view-btn">View</button>
                <button type="button" class="secondary-btn done-btn">${topic.done ? "Revised" : "Mark Revised"}</button>
                <button type="button" class="topic-delete-btn" aria-label="Delete topic"></button>
            </div>
        `;

        card.querySelector(".view-btn").addEventListener("click", () => openTopic(topic.id));
        card.querySelector(".done-btn").addEventListener("click", () => toggleTopicDone(topic.id));
        card.querySelector(".topic-delete-btn").addEventListener("click", event => {
            event.stopPropagation();
            deleteTopic(topic.id);
        });

        topicList.appendChild(card);
    });
}

function updateSavePath() {
    const savePath = document.getElementById("savePath");
    const subject = getSelectedSubject();
    const topic = getSelectedTopic();

    if (!subject) savePath.textContent = "No subject selected";
    else if (!topic) savePath.textContent = subject.name + " > No topic selected";
    else savePath.textContent = subject.name + " > " + topic.title;
}

function updateEditorStatus() {
    const editorStatus = document.getElementById("editorStatus");
    const topic = getSelectedTopic();

    if (!topic) editorStatus.textContent = "No Topic Selected";
    else editorStatus.textContent = topic.notes ? "Saved" : "Empty Topic";
}

function addSubject() {
    const input = document.getElementById("newSubjectInput");
    const subjectName = input.value.trim();
    if (!subjectName) return alert("Please type a subject name.");

    const existing = subjects.find(subject => subject.name.toLowerCase() === subjectName.toLowerCase());
    if (existing) selectedSubjectId = existing.id;
    else {
        const subject = { id: createId(), name: subjectName, topics: [], progress: 0 };
        subjects.push(subject);
        selectedSubjectId = subject.id;
    }

    selectedTopicId = null;
    input.value = "";
    document.getElementById("notesArea").value = "";
    renderPage();
}

function changeSubject() {
    selectedSubjectId = document.getElementById("subjectSelect").value;
    const subject = getSelectedSubject();
    selectedTopicId = subject && subject.topics[0] ? subject.topics[0].id : null;
    document.getElementById("notesArea").value = getSelectedTopic() ? getSelectedTopic().notes : "";
    renderPage();
}

function deleteSubject(subjectId) {
    subjects = subjects.filter(subject => subject.id !== subjectId);
    if (selectedSubjectId === subjectId) {
        selectedSubjectId = subjects[0] ? subjects[0].id : null;
        const subject = getSelectedSubject();
        selectedTopicId = subject && subject.topics[0] ? subject.topics[0].id : null;
        document.getElementById("notesArea").value = "";
    }
    renderPage();
}

function addTopic() {
    const subject = getSelectedSubject();
    const input = document.getElementById("newTopicInput");
    const topicTitle = input.value.trim();

    if (!subject) return alert("Please add or select a subject first.");
    if (!topicTitle) return alert("Please type a topic name.");

    const existing = subject.topics.find(topic => topic.title.toLowerCase() === topicTitle.toLowerCase());
    if (existing) selectedTopicId = existing.id;
    else {
        const topic = { id: createId(), title: topicTitle, notes: "", fileName: "", updatedAt: "", done: false };
        subject.topics.push(topic);
        selectedTopicId = topic.id;
    }

    input.value = "";
    document.getElementById("notesArea").value = getSelectedTopic().notes || "";
    renderPage();
}

function changeTopic() {
    selectedTopicId = document.getElementById("topicSelect").value;
    const topic = getSelectedTopic();
    document.getElementById("notesArea").value = topic ? topic.notes : "";
    renderPage();
}

function openTopic(topicId) {
    selectedTopicId = topicId;
    const topic = getSelectedTopic();
    document.getElementById("notesArea").value = topic ? topic.notes : "";
    renderPage();
    document.getElementById("notesArea").scrollIntoView({ behavior: "smooth", block: "center" });
}

function toggleTopicDone(topicId) {
    const subject = getSelectedSubject();
    if (!subject) return;

    const topic = subject.topics.find(item => item.id === topicId);
    if (!topic) return;

    topic.done = !topic.done;
    renderPage();
}

function deleteTopic(topicId) {
    const subject = getSelectedSubject();
    if (!subject) return;

    subject.topics = subject.topics.filter(topic => topic.id !== topicId);
    selectedTopicId = subject.topics[0] ? subject.topics[0].id : null;
    document.getElementById("notesArea").value = getSelectedTopic() ? getSelectedTopic().notes : "";
    renderPage();
}

function showSelectedFile() {
    const fileInput = document.getElementById("fileUpload");
    const fileNameDisplay = document.getElementById("fileNameDisplay");
    fileNameDisplay.textContent = fileInput.files.length > 0 ? fileInput.files[0].name : "No file";
}

function isPdfFile(file) {
    return file && (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf"));
}

async function generateNotes() {
    const subject = getSelectedSubject();
    const topic = getSelectedTopic();
    const notesArea = document.getElementById("notesArea");
    const fileInput = document.getElementById("fileUpload");
    const generateBtn = document.getElementById("generateBtn");

    if (!subject) return alert("Please add or select a subject first.");
    if (!topic) return alert("Please add or select a topic first.");
    if (fileInput.files.length === 0) return alert("Please choose a PDF file first.");

    const file = fileInput.files[0];
    if (!isPdfFile(file)) {
        alert("Please upload PDF files only.");
        fileInput.value = "";
        showSelectedFile();
        return;
    }

    const formData = new FormData();
    formData.append("subject", subject.name);
    formData.append("topic", topic.title);
    formData.append("file", file);

    notesArea.value = "Generating notes...";
    generateBtn.disabled = true;
    generateBtn.textContent = "Generating...";
    autoResizeNotesEditor();

    try {
        const response = await fetch(API_BASE_URL + "/generate_notes_from_file", { method: "POST", body: formData });
        const data = await response.json();

        if (data.success && data.notes) {
            topic.notes = data.notes;
            topic.fileName = file.name;
            topic.updatedAt = new Date().toISOString();
            notesArea.value = data.notes;
            renderPage();
        } else {
            notesArea.value = data.message || "AI generation failed.";
        }
    } catch (error) {
        console.error(error);
        notesArea.value = "Error connecting to backend. Make sure Flask backend is running.";
    } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Generate Notes";
        autoResizeNotesEditor();
    }
}

async function saveNotesToCurrentTopic() {
    const subject = getSelectedSubject();
    const topic = getSelectedTopic();
    const notesArea = document.getElementById("notesArea");

    if (!subject || !topic) return alert("Please select a topic first.");

    topic.notes = notesArea.value;
    topic.updatedAt = new Date().toISOString();
    saveSubjects();
    renderPage();

    const backendResult = await saveNoteToBackend(subject.name, topic.title, notesArea.value);
    if (backendResult.success) await loadNotesFromBackend();

    showQuizCta();
    alert(backendResult.success ? "Notes saved to database." : "Notes saved locally.");
}

function copyNotes() {
    const notesArea = document.getElementById("notesArea");
    notesArea.select();
    document.execCommand("copy");
    alert("Notes copied.");
}

function clearEditor() {
    document.getElementById("notesArea").value = "";
    autoResizeNotesEditor();
}

function showQuizCta() {
    document.getElementById("quizCta")?.classList.add("show");
}

function autoResizeNotesEditor() {
    const notesArea = document.getElementById("notesArea");
    if (!notesArea) return;

    notesArea.style.height = "auto";
    notesArea.style.height = Math.max(340, notesArea.scrollHeight) + "px";
}

function scrollSubjectStrip(direction) {
    scrollStrip("subjectList", ".subject-card", direction);
}

function scrollTopicStrip(direction) {
    scrollStrip("topicList", ".topic-card", direction);
}

function scrollStrip(stripId, cardSelector, direction) {
    const strip = document.getElementById(stripId);
    if (!strip) return;

    const card = strip.querySelector(cardSelector);
    const amount = card ? card.offsetWidth + 12 : 180;
    strip.scrollBy({ left: direction * amount, behavior: "smooth" });
}

function escapeHTML(value) {
    return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#039;",
        '"': "&quot;"
    }[char]));
}

document.addEventListener("input", event => {
    if (event.target && event.target.id === "notesArea") autoResizeNotesEditor();
});

async function initializePage() {
    renderPage();
    await loadNotesFromBackend();
    autoResizeNotesEditor();
}

initializePage();
</script>
</body>
</html>
