<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    * {
      box-sizing: border-box;
    }

    .top-bar {
      position: fixed;
      top: 25px;
      left: 25px;
      z-index: 2;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .home-btn {
      text-decoration: none;
      color: #1e3a5f;
      font-size: 15px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .home-btn:hover {
      color: #2563eb;
    }

    body {
      font-family: Arial, sans-serif;
      background: #8fb9d6;
      color: #1f2937;
      min-height: 100vh;
      transition: background 0.3s ease;
    
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h2 {
      color: #1e293b;
      font-size: 30px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 2px solid #dbeafe;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
      color: #1f2937;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
      );
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
    }

    a {
      text-decoration: none;
      color: #3b82f6;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
      color: #475569;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }

    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.7;
      z-index: 0;
    }

    .shape1 {
      width: 350px;
      height: 350px;
      background: #c7d7e7;
      top: -100px;
      left: -100px;
    }

    .shape2 {
      width: 350px;
      height: 350px;
      background: #9db8d4;
      bottom: -100px;
      right: -100px;
    }

    /* GLOBAL DARK MODE RULES */
    body.dark-mode {
      background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
                  #0f172a;
      background-attachment: fixed;
    }

    /* Adjusting top navigation button container in dark mode for readability */
    body.dark-mode .top-bar {
      background: rgba(15, 23, 42, 0.4);
      border-color: rgba(255, 255, 255, 0.1);
    }

    body.dark-mode .home-btn {
      color: #cbd5e1;
    }

    body.dark-mode .home-btn:hover {
      color: #3b82f6;
    }

    /* Keeping the container card pristine white */
    body.dark-mode .container {
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
    }

    body.dark-mode h2 {
      color: #1e293b;
    }

    body.dark-mode input {
      background: #f8fafc;
      color: #1f2937;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <a href="websitepage.html" class="home-btn">Home</a>
</div>

<div class="container">
  <h2>Login</h2>

  <form onsubmit="loginUser(event)">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>

  <div class="links">
    <p>Don't have an account? <a href="register.html">Register</a></p>
    <p><a href="forgot.html">Forgot Password?</a></p>
  </div>

  <p id="message"></p>
</div>

<script>
// ===== APPLY SAVED THEME =====
(function () {
    const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
    const theme = appearance.theme || "Light";
    const fontSize = appearance.fontSize || "Medium";

    if (theme === "Dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

    if (fontSize === "Small") {
        document.body.style.fontSize = "14px";
    } else if (fontSize === "Medium") {
        document.body.style.fontSize = "16px";
    } else if (fontSize === "Large") {
        document.body.style.fontSize = "18px";
    }
})();

async function loginUser(event) {
  event.preventDefault();

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let message = document.getElementById("message");

  try {
    const res = await fetch("http://127.0.0.1:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password
      })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("userEmail", data.email);
      localStorage.setItem("is_admin", data.is_admin);
      localStorage.setItem("username", data.username);

      message.style.color = "green";
      message.innerText = "Login successful!";

      setTimeout(() => {
        if (data.is_admin === 1) {
          window.location.href = "admindashboard.html";
        } else {
          window.location.href = "dashboard.html";
        }
      }, 800);

    } else {
      message.style.color = "red";
      message.innerText = data.message;
    }

  } catch (err) {
    console.error(err);
    message.style.color = "red";
    message.innerText = "Server error. Try again.";
  }
}
</script>

</body>
</html>
