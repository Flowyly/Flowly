<!DOCTYPE html>
<html>
<head>
  <title>Study Tracker</title>
  <style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;

  background: linear-gradient(
    135deg,
    #dbe4f0,
    #cbdcf5,
    #d6e6f5
  );

  color: #1e293b;
  transition: background 0.4s ease, color 0.4s ease;
}

/* DARK MODE */
body.dark-mode {
  background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
              radial-gradient(circle at 80% 30%, #312e81, transparent 40%),
              #0f172a;

  color: #f1f5f9;
}

/* SHAPES (BASE) */
.bg-shape {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.7;
  z-index: -1;
  animation: float 10s ease-in-out infinite;
  transition: all 0.4s ease;
}

.shape1 {
  width: 350px;
  height: 350px;
  background: #93c5fd;
  top: -80px;
  left: -80px;
}

.shape2 {
  width: 350px;
  height: 350px;
  background: #c4b5fd;
  bottom: -100px;
  right: -100px;
}

/* DARK MODE SHAPES */
body.dark-mode .shape1 {
  background: #3b82f6;
  opacity: 0.08;
  filter: blur(130px);
}

body.dark-mode .shape2 {
  background: #a855f7;
  opacity: 0.06;
  filter: blur(150px);
}

/* FLOAT ANIMATION */
@keyframes float {
  0%, 100% {
    transform: translateY(0px) translateX(0px);
  }
  50% {
    transform: translateY(-20px) translateX(20px);
  }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;

  backdrop-filter: blur(10px);
}

body.dark-mode .navbar {
  border: 1px solid rgba(255, 255, 255, 0.05);
}

/* LOGO */
.logo {
  font-weight: bold;
  font-size: 20px;
}

/* LINKS */
.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: #1e293b;
  font-size: 14px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #3b82f6;
}

body.dark-mode .nav-links a {
  color: #e2e8f0;
}

/* BUTTONS */
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn-login {
  background: transparent;
  border: 1px solid #1e293b;
  color: #1e293b;
}

body.dark-mode .btn-login {
  border: 1px solid #94a3b8;
  color: #e2e8f0;
}

.btn-register {
  background: #3b82f6;
  color: white;
}

/* HERO */
.hero {
  margin-top: 100px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero span {
  color: #3b82f6;
}

body.dark-mode .hero span {
  color: #60a5fa;
}

.hero p {
  max-width: 600px;
  margin: 20px auto;
  color: #475569;
}

body.dark-mode .hero p {
  color: #cbd5e1;
}

/* BUTTON SPACING */
.hero-buttons {
  margin-top: 20px;
}

.hero-buttons button {
  margin: 10px;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  padding: 20px;
  color: #64748b;
  background: transparent;
  border: none;
  box-shadow: none;
}

/* TITLE */
.brand-title {
  font-family: "Segoe UI", Arial, sans-serif;
  font-size: 64px;
  font-weight: 800;
  letter-spacing: 5px;
  margin-bottom: 18px;

  background: linear-gradient(135deg, #2563eb, #60a5fa);

  -webkit-background-clip: text;
  background-clip: text;

  -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="navbar">
  <div class="logo">Flowly</div>

  <div class="nav-links">
  <a href="login1.html">Login</a>
  <a href="forgot.html">Forgot Password</a>
  <a href="register.html">
    <button class="btn btn-register">Register</button>
  </a>
</div>
</div>

<!-- Hero Section -->
<div class="hero">
  <h2 class="brand-title">FLOWLY</h2>
  <h1>Be Smart.<br><span>Track your progress.</span></h1>

  <p>
    A simple study tracker that helps you manage your coursework,
    track your progress, and stay consistent with your learning.
  </p>

  <div class="hero-buttons">
    <button class="btn btn-register" onclick="goRegister()">Get Started</button>
    <button class="btn btn-login" onclick="goLogin()">Login</button>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  © 2026 StudyTrack. All rights reserved.
</div>

<script>
// ===== APPLY SAVED THEME =====
(function() {
    const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
    const theme = appearance.theme || "Default Blue";
    const fontSize = appearance.fontSize || "Medium";

    // ONLY handle dark mode class (no background override)
    if (theme === "Dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

    // font size stays
    if (fontSize === "Small") {
        document.body.style.fontSize = "14px";
    } else if (fontSize === "Medium") {
        document.body.style.fontSize = "16px";
    } else if (fontSize === "Large") {
        document.body.style.fontSize = "18px";
    }
})();

function goLogin() {
  window.location.href = "login1.html";
}

function goRegister() {
  window.location.href = "register.html";
}
</script>

</body>
</html>
