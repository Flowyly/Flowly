<!DOCTYPE html>
<html>
<head>
  <title>Study Tracker</title>
  <style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #f8fafc, #e0f2fe);
  color: #1e293b;
  text-align: center;
}

/* BACKGROUND SHAPES */
.bg-shape {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: 0;
}

.shape1 {
  width: 300px;
  height: 300px;
  background: #dbeafe;
  top: -50px;
  left: -50px;
}

.shape2 {
  width: 300px;
  height: 300px;
  background: #e0f2fe;
  bottom: -50px;
  right: -50px;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: #1e293b;
  font-size: 14px;
}

.nav-links a:hover {
  color: #3b82f6;
}

/* BUTTONS */
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-login {
  background: transparent;
  border: 1px solid #1e293b;
  color: #1e293b;
}

.btn-register {
  background: #3b82f6;
  color: white;
}

/* HERO */
.hero {
  margin-top: 100px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero span {
  color: #3b82f6;
}

.hero p {
  max-width: 600px;
  margin: 20px auto;
  color: #475569;
}

.hero-buttons {
  margin-top: 20px;
}

.hero-buttons button {
  margin: 10px;
}

/* FOOTER */
.footer {
  margin-top: 100px;
  padding: 20px;
  color: #64748b;
}
</style>
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="navbar">
  <div class="logo">Flowly</div>

  <div class="nav-links">
  <a href="login1.html">Login</a>
  <a href="forgot.html">Forgot Password</a>
  <a href="register.html">
    <button class="btn btn-register">Register</button>
  </a>
</div>
</div>

<!-- Hero Section -->
<div class="hero">
  <h1>Be Smart.<br><span>Track your progress.</span></h1>

  <p>
    A simple study tracker that helps you manage your coursework,
    track your progress, and stay consistent with your learning.
  </p>

  <div class="hero-buttons">
    <button class="btn btn-register" onclick="goRegister()">Get Started</button>
    <button class="btn btn-login" onclick="goLogin()">Login</button>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  © 2026 StudyTrack. All rights reserved.
</div>

<script>
// ===== APPLY SAVED THEME =====
(function() {
    const appearance = JSON.parse(localStorage.getItem("appearanceSettings")) || {};
    const theme = appearance.theme || "Default Blue";
    const fontSize = appearance.fontSize || "Medium";

    if (theme === "Default Blue") {
        document.body.style.background = "linear-gradient(135deg, #f8fbff, #eaf6ff, #dbeafe)";
        document.body.style.color = "#1f2937";
    } else if (theme === "Light") {
        document.body.style.background = "#f8fbff";
        document.body.style.color = "#1f2937";
    } else if (theme === "Dark") {
        document.body.style.background = "#1e293b";
        document.body.style.color = "#f8fafc";
    }

    if (fontSize === "Small") {
        document.body.style.fontSize = "14px";
    } else if (fontSize === "Medium") {
        document.body.style.fontSize = "16px";
    } else if (fontSize === "Large") {
        document.body.style.fontSize = "18px";
    }
})();

function goLogin() {
  window.location.href = "login1.html";
}

function goRegister() {
  window.location.href = "register.html";
}
</script>

</body>
</html>
