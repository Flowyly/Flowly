<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
   body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:#8fb9d6
  }

  /* NAVBAR */
 /* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 30px;
  margin: 20px;

  background: rgba(255, 255, 255, 0.75);

  backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.4);

  border-radius: 20px;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.08);

  transition: all 0.3s ease;
}

/* LEFT NAV */
.nav-left {
  display: flex;
  align-items: center;
  gap: 18px;
}

/* NAV ITEMS */
.nav-item {
  position: relative;

  padding: 10px 18px;

  border-radius: 12px;

  cursor: pointer;

  font-weight: 500;
  color: #334155;

  transition:
    background 0.25s ease,
    color 0.25s ease,
    transform 0.2s ease;
}

/* HOVER EFFECT */
.nav-item:hover {
  background: #dbeafe;

  color: #2563eb;

  transform: translateY(-2px);
}

/* ACTIVE PAGE */
.nav-item.active {
  background: linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
  );

  color: white;

  font-weight: 600;

  box-shadow:
    0 4px 12px rgba(37, 99, 235, 0.35);
}

/* PROFILE */
.profile {
  width: 42px;
  height: 42px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;

  background: #eff6ff;

  font-size: 20px;

  cursor: pointer;

  transition:
    background 0.25s ease,
    transform 0.2s ease;
}

.profile:hover {
  background: #dbeafe;

  transform: scale(1.08);
}

  /* PROFILE */
  .profile {
    position: relative;
    cursor: pointer;
    font-size: 15px;
  }

  .profile-menu {
    font: arial;
    border: 2px solid black;
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: rgb(255, 255, 255);
    border-radius: 19px;
    width: 180px;
    box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.15);
    
  }

  .profile-menu div {
    padding: 12px;
    cursor: pointer;
    border-radius: 19px;
  }

  .profile-menu div:hover {
    background: #6fa0d0;
    color: white;
    border-radius: 19px;
    border: 2px solid black;
  }

  /* DASHBOARD */
  .container {
    padding: 30px;
  }

  .grid {
    display: flex;
    gap: 20px;
  }

  .card {
    border: 2px solid black;
    flex: 1;
    background: white;
    padding: 20px;
    box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.42);
    border-radius: 10px;
    min-height: 220px;
  }

  .card h3 {
    margin-top: 0;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 10px;
    color: #1e293b;
  }

  .calendar-card {
  padding: 10px;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.weekdays, .calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.weekdays div {
  text-align: center;
  font-weight: bold;
  padding: 5px;
}

.calendar div {
  height: 40px;
  border: 1px solid #ddd;
  text-align: center;
  padding-top: 10px;
}

  /* ITEMS */
  .item {
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    font-size: 14px;
  }

  /* STATUS COLORS */
  .urgent {
    background: #fee2e2;
    color: #b91c1c;
  }

  .warning {
    background: #fef3c7;
    color: #92400e;
  }

  .done {
    background: #dcfce7;
    color: #166534;
  }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-item active" onclick="goHome()">Home</div>
    <div class="nav-item" onclick="goWork()">Work</div>
    <div class="nav-item" onclick="goGenerateQuiz()"> Quiz</div>
  </div>

  <div class="profile" onclick="toggleMenu()">
    👤
    <div class="profile-menu" id="menu">
      <div onclick="goProfile()">Profile</div>
      <div onclick="goSettings()">Settings</div>
      <div onclick="logout()">Logout</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container">
  <div class="grid">

    <!-- TO DO -->
    <div class="card">
  <h3>To Do</h3>
  <div class="item urgent">Math Assignment (Due Tomorrow)</div>
  <div class="item warning">Group Project (3 days left)</div>
  <div class="item done">English Essay (Completed)</div>
</div>

    <!-- REMINDER -->
    <div class="card">
      <h3>Reminder</h3>
      <div class="item">Assignment due tomorrow</div>
      <div class="item">Meeting at  PM</div>
    </div>

    <!-- CALENDAR -->
    <div class="card calendar-card">
      <h3>Calendar</h3>

    <div class="calendar-header">
      <button onclick="prevMonth()">◀</button>
      <span id="monthYear"></span>
      <button onclick="nextMonth()">▶</button>
    </div>

    <div class="weekdays">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <div id="calendar" class="calendar"></div>
</div>

  </div>
</div>

<script>

function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function goGenerateQuiz() {
  window.location.href = "generatequiz.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goSettings() {
  window.location.href = "settings.html";
}

function logout() {
  window.location.href = "login1.html";

let currentDate = new Date();

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  const monthYear = document.getElementById("monthYear");

  calendar.innerHTML = "";

  let year = currentDate.getFullYear();
  let month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  monthYear.textContent = `${months[month]} ${year}`;

  let calendarHTML = "";

  for (let i = 0; i < firstDay; i++) {
    calendarHTML += "<div></div>";
  }

  for (let day = 1; day <= lastDate; day++) {
    calendarHTML += `<div>${day}</div>`;
  }

  calendar.innerHTML = calendarHTML;
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

renderCalendar();


}
</script>

</body>
</html>
