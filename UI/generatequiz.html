<!DOCTYPE html>
<html>
<head>
  <title>Quiz Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:#8fb9d6
      
    }

    /* NAVBAR */
   /* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 30px;
  margin: 20px;

  background: rgba(255, 255, 255, 0.75);

  backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.4);

  border-radius: 20px;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.08);

  transition: all 0.3s ease;
}

/* LEFT NAV */
.nav-left {
  display: flex;
  align-items: center;
  gap: 18px;
}

/* NAV ITEMS */
.nav-item {
  position: relative;

  padding: 10px 18px;

  border-radius: 12px;

  cursor: pointer;

  font-weight: 500;
  color: #334155;

  transition:
    background 0.25s ease,
    color 0.25s ease,
    transform 0.2s ease;
}

/* HOVER EFFECT */
.nav-item:hover {
  background: #dbeafe;

  color: #2563eb;

  transform: translateY(-2px);
}

/* ACTIVE PAGE */
.nav-item.active {
  background: linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
  );

  color: white;

  font-weight: 600;

  box-shadow:
    0 4px 12px rgba(37, 99, 235, 0.35);
}

/* PROFILE */
.profile {
  width: 42px;
  height: 42px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;

  background: #eff6ff;

  font-size: 20px;

  cursor: pointer;

  transition:
    background 0.25s ease,
    transform 0.2s ease;
}

.profile:hover {
  background: #dbeafe;

  transform: scale(1.08);
}

    .profile {
    position: relative;
    cursor: pointer;
    font-size: 15px;
  }

  .profile-menu {
    font: arial;
    border: 2px solid black;
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: rgb(255, 255, 255);
    border-radius: 19px;
    width: 180px;
    box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.15);
    
  }

  .profile-menu div {
    padding: 12px;
    cursor: pointer;
    border-radius: 19px;
  }

  .profile-menu div:hover {
    background: #6fa0d0;
    color: white;
    border-radius: 19px;
    border: 2px solid black;
  }

    /* MAIN */
    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .title-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .title-section h1 {
      margin-bottom: 10px;
      font-size: 38px;
    }

    .title-section p {
      color: #64748b;
    }

    /* UPLOAD CARD */
    .upload-card {
      background: white;
      border: 2px dashed #93c5fd;
      border-radius: 15px;
      padding: 50px 30px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .upload-icon {
      font-size: 60px;
      margin-bottom: 15px;
    }

    .upload-card h2 {
      margin-bottom: 10px;
    }

    .upload-card p {
      color: #64748b;
      margin-bottom: 20px;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    /* OPTIONS */
    .options {
      display: flex;
      gap: 20px;
      margin-top: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }

    select,
    input[type="number"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
    }

    /* BUTTON */
    .generate-btn {
      margin-top: 25px;
      padding: 12px 30px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .generate-btn:hover {
      background: #2563eb;
    }

    /* FILE NAME */
    #fileName {
      margin-top: 15px;
      color: #475569;
      font-size: 14px;
    }

    /* LOADING */
    .loading {
      display: none;
      text-align: center;
      margin-top: 30px;
      font-size: 18px;
      color: #3b82f6;
      font-weight: bold;
    }

    /* QUIZ SECTION */
    .quiz-section {
      margin-top: 50px;
    }

    .question-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .question-card h3 {
      margin-top: 0;
    }

    .option {
      margin-top: 10px;
      padding: 10px;
      background: #f8fafc;
      border-radius: 8px;
    }

    /* SUBMIT */
    .submit-btn {
      display: none;
      margin: 30px auto;
      padding: 12px 30px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .submit-btn:hover {
      background: #059669;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="nav-left">
    <div class="nav-item" onclick="goHome()">Home</div>
    <div class="nav-item" onclick="goWork()">Work</div>
    <div class="nav-item active" onclick="goGenerateQuiz()">Quiz</div>
    <div class="nav-item" onclick="goGenerateNotes()">Notes</div>
  </div>

  <div class="profile" onclick="toggleMenu()">
    👤
    <div class="profile-menu" id="menu">
      <div onclick="goProfile()">Profile</div>
      <div onclick="goSettings()">Settings</div>
      <div onclick="logout()">Logout</div>
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="container">

  <!-- TITLE -->
  <div class="title-section">
    <h1>Generate Quiz from PDF</h1>
    <p>Upload lecture notes or coursework materials to generate quizzes automatically.</p>
  </div>

  <!-- UPLOAD -->
  <div class="upload-card">

    <div class="upload-icon">📄</div>

    <h2>Upload PDF File</h2>

    <p>Drag & drop your PDF or choose file</p>

    <input type="file" id="pdfFile" accept=".pdf" onchange="showFileName()">

    <div id="fileName"></div>

    <!-- OPTIONS -->
    <div class="options">

      <select id="difficulty">
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>

      <input type="number"
       id="questionCount"
       value="10"
       min="1"
       max="20">

    </div>

    <button type="button" class="generate-btn" id="generateBtn">
  Generate Quiz
    </button>

  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    ⏳ Generating quiz...
  </div>

  <!-- QUIZ -->
  <div class="quiz-section" id="quizSection"></div>

  <!-- SUBMIT -->
  <div style="text-align:center;">
    
  </div>

</div>

<script>

if (!localStorage.getItem("userEmail")) {
  window.location.href = "login1.html";
}

function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goSettings() {
  window.location.href = "settings.html";
}

function logout() {
  window.location.href = "login1.html";
}

function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function goGenerateNotes() {
  window.location.href = "generatenotes.html";
}
function goGenerateQuiz() {
  window.location.href = "generatequiz.html";
}

function showFileName() {
  let file = document.getElementById("pdfFile").files[0];

  if (file) {
    document.getElementById("fileName").innerText =
      "Uploaded: " + file.name;

    // ✅ SAVE HERE (correct place)
    localStorage.setItem("lastFileName", file.name);
  }
}

async function generateQuiz(event) {
  if (event) event.preventDefault();

  document.getElementById("generateBtn").disabled = true;
  document.getElementById("loading").style.display = "block";

  let file = document.getElementById("pdfFile").files[0];

  if (!file) {
    alert("Please upload a PDF");
    document.getElementById("loading").style.display = "none";
    document.getElementById("generateBtn").disabled = false;
    return;
  }

  try {
    const formData = new FormData();
    formData.append("pdf", file);
    formData.append("difficulty", document.getElementById("difficulty").value);
    formData.append("questionCount", document.getElementById("questionCount").value);

    localStorage.setItem("lastDifficulty", document.getElementById("difficulty").value);
    localStorage.setItem("lastCount", document.getElementById("questionCount").value);

    const res = await fetch("http://127.0.0.1:5000/generate_quiz", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("generateBtn").disabled = false;

    if (data.success) {
      displayQuizFromAI(data.quiz);
    } else {
      console.log("BACKEND ERROR:", data.message);
      alert(data.message);
    }

  } catch (err) {
    console.error(err);
    document.getElementById("loading").style.display = "none";
    document.getElementById("generateBtn").disabled = false;
    alert("Server Error");
  }
}

function displayQuizFromAI(quizText) {
  const quizSection = document.getElementById("quizSection");

  // ✅ Guard - don't re-render if quiz already showing
  if (quizSection.dataset.locked === "true") return;
  quizSection.dataset.locked = "true";

  quizSection.innerHTML = "";

  const questions = quizText.split(/(?=Q\d+\.)/g);

  if (!questions || questions.length === 0) {
    quizSection.innerHTML = "<p>Failed to parse quiz</p>";
    return;
  }

  questions.forEach(q => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.innerHTML = `<pre style="white-space: pre-wrap;">${q}</pre>`;
    quizSection.appendChild(card);
  });
}

window.onload = function () {
  // Restore saved preferences
  const diff = localStorage.getItem("lastDifficulty");
  const count = localStorage.getItem("lastCount");
  const fileName = localStorage.getItem("lastFileName");

  if (diff) document.getElementById("difficulty").value = diff;
  if (count) document.getElementById("questionCount").value = count;
  if (fileName)
    document.getElementById("fileName").innerText = "Uploaded: " + fileName;

  // Attach button listener here (not in DOMContentLoaded)
  document.getElementById("generateBtn").addEventListener("click", function (event) {
    event.preventDefault();
    event.stopPropagation();
    generateQuiz(event);
  });
};

</script>

</body>
</html>
