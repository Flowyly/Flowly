<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #dbeafe, #e0f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }

    .shape1 {
      width: 300px;
      height: 300px;
      background: #93c5fd;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 300px;
      height: 300px;
      background: #bfdbfe;
      bottom: -50px;
      right: -50px;
    }

    /* Card */
    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      color: #1e293b;
      margin-bottom: 15px;
    }

    p {
      font-size: 14px;
      color: #475569;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    a {
      text-decoration: none;
      color: #3b82f6;
      font-size: 14px;
    }

    .links {
      margin-top: 15px;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    /* Home button */
    .top-bar {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    .home-btn {
      text-decoration: none;
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- Background shapes -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<!-- Home button -->
<div class="top-bar">
  <a href="websitepage.html" class="home-btn">← Home</a>
</div>

<!-- Card -->
<div class="container">
  <h2>Forgot Password</h2>

  <p>Enter your email and we’ll send you a reset link.</p>

  <form onsubmit="resetPassword(event)">
    <input type="email" id="email" placeholder="Email" required>
    <button type="submit">Send Reset Link</button>
  </form>

  <div class="links">
    <p><a href="login1.html">Back to Login</a></p>
  </div>

  <p id="message"></p>
</div>

<script>
function resetPassword(event) {
  event.preventDefault();

  let email = document.getElementById("email").value;

  let savedEmail = "test@gmail.com";

  if (email === savedEmail) {
    document.getElementById("message").style.color = "green";
    document.getElementById("message").innerText =
      "Reset link sent to your email!";
  } else {
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText =
      "Email not found!";
  }
}
</script>

</body>
</html>
