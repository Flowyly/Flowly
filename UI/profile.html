<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e0f2fe);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
    }

    .nav-left {
      display: flex;
      gap: 20px;
    }

    .nav-item {
      cursor: pointer;
      color: #475569;
    }

    .profile-icon {
      font-size: 20px;
      cursor: pointer;
    }

    /* CONTAINER */
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .avatar {
      text-align: center;
      font-size: 50px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    .section {
      margin-top: 25px;
    }

    #message {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-item" onclick="goHome()">Home</div>
    <div class="nav-item" onclick="goWork()">Work</div>
  </div>

  <div class="profile-icon">👤</div>
</div>

<!-- PROFILE -->
<div class="container">
  <div class="avatar">👤</div>
  <h2>Profile</h2>

  <!-- EDIT PROFILE -->
  <div class="section">
    <label>Username</label>
    <input type="text" id="username" value="Adam">

    <label>Email</label>
    <input type="email" id="email" value="adam@gmail.com">

    <button onclick="saveProfile()">Save Changes</button>
  </div>

  <!-- CHANGE PASSWORD -->
  <div class="section">
    <h3>Change Password</h3>

    <input type="password" id="currentPass" placeholder="Current Password">
    <input type="password" id="newPass" placeholder="New Password">
    <input type="password" id="confirmPass" placeholder="Confirm Password">

    <button onclick="changePassword()">Update Password</button>
  </div>

  <p id="message"></p>
</div>

<script>
function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function saveProfile() {
  let username = document.getElementById("username").value;
  let email = document.getElementById("email").value;

  document.getElementById("message").style.color = "green";
  document.getElementById("message").innerText = "Profile updated successfully!";
}

function changePassword() {
  let current = document.getElementById("currentPass").value;
  let newPass = document.getElementById("newPass").value;
  let confirm = document.getElementById("confirmPass").value;

  if (!current || !newPass || !confirm) {
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText = "Please fill all fields";
    return;
  }

  if (newPass !== confirm) {
    document.getElementById("message").style.color = "red";
    document.getElementById("message").innerText = "Passwords do not match";
    return;
  }

  document.getElementById("message").style.color = "green";
  document.getElementById("message").innerText = "Password updated successfully!";
}
</script>

</body>
</html>
