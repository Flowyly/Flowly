<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
       background:#8fb9d6
    }

    /* Background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }

    .shape1 {
      width: 300px;
      height: 300px;
      background: #93c5fd;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 300px;
      height: 300px;
      background: #bfdbfe;
      bottom: -50px;
      right: -50px;
    }

    /* Navbar */
    /* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 30px;
  margin: 20px;

  background: rgba(255, 255, 255, 0.75);

  backdrop-filter: blur(12px);

  border: 1px solid rgba(255, 255, 255, 0.4);

  border-radius: 20px;

  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.08);

  transition: all 0.3s ease;
}

/* LEFT NAV */
.nav-left {
  display: flex;
  align-items: center;
  gap: 18px;
}

/* NAV ITEMS */
.nav-item {
  position: relative;

  padding: 10px 18px;

  border-radius: 12px;

  cursor: pointer;

  font-weight: 500;
  color: #334155;

  transition:
    background 0.25s ease,
    color 0.25s ease,
    transform 0.2s ease;
}

/* HOVER EFFECT */
.nav-item:hover {
  background: #dbeafe;

  color: #2563eb;

  transform: translateY(-2px);
}

/* ACTIVE PAGE */
.nav-item.active {
  background: linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
  );

  color: white;

  font-weight: 600;

  box-shadow:
    0 4px 12px rgba(37, 99, 235, 0.35);
}

/* PROFILE */
.profile {
  width: 42px;
  height: 42px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;

  background: #eff6ff;

  font-size: 20px;

  cursor: pointer;

  transition:
    background 0.25s ease,
    transform 0.2s ease;
}

.profile:hover {
  background: #dbeafe;

  transform: scale(1.08);
}

     /* PROFILE */
  .profile {
    position: relative;
    cursor: pointer;
    font-size: 15px;
  }

  .profile-menu {
    font: arial;
    border: 2px solid black;
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: rgb(255, 255, 255);
    border-radius: 19px;
    width: 180px;
    box-shadow: 7px 13px 15px -1px rgba(0, 0, 0, 0.15);
    
  }

  .profile-menu div {
    padding: 12px;
    cursor: pointer;
    border-radius: 19px;
  }

  .profile-menu div:hover {
    background: #6fa0d0;
    color: white;
    border-radius: 19px;
    border: 2px solid black;
  }

    

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 40px auto;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      color: #1e293b;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
    }

    button {
      padding: 10px 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }

    .delete-btn {
      background: #ef4444;
    }

    /* Status colors */
    .status-progress { color: orange; }
    .status-review { color: blue; }
    .status-complete { color: green; }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-item " onclick="goHome()">Home</div>
    <div class="nav-item active" onclick="goWork()">Work</div>
    <div class="nav-item" onclick="goGenerateQuiz()">Quiz</div>
    <div class="nav-item" onclick="goGenerateNotes()">Notes</div>
  </div>

  <div class="profile" onclick="toggleMenu()">
    👤
    <div class="profile-menu" id="menu">
      <div onclick="goProfile()">Profile</div>
      <div onclick="goSettings()">Settings</div>
      <div onclick="logout()">Logout</div>
    </div>
  </div>
</div>






<!-- Main -->
<div class="container">
  <h2>Coursework Dashboard</h2>

  <!-- Input Form -->
  <input type="text" id="subject" placeholder="Subject Name">
  <input type="text" id="members" placeholder="Group Members (comma separated)">
  <input type="date" id="dueDate">

  <select id="status">
    <option value="In Progress">In Progress</option>
    <option value="In Review">In Review</option>
    <option value="Completed">Completed</option>
  </select>

  <button onclick="addCoursework()">Add</button>

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th>Subject</th>
        <th>Group Members</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>

function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function goHome() {
  window.location.href = "dashboard.html";
}

function goWork() {
  window.location.href = "work.html";
}

function goGenerateQuiz() {
  window.location.href = "generatequiz.html";
}

function goGenerateNotes() {
  window.location.href = "generatenotes.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function goSettings() {
  window.location.href = "settings.html";
}

function logout() {
  window.location.href = "login1.html";
}
let coursework = [];

function addCoursework() {
  let subject = document.getElementById("subject").value;
  let members = document.getElementById("members").value;
  let dueDate = document.getElementById("dueDate").value;
  let status = document.getElementById("status").value;

  if (!subject || !members || !dueDate) {
    alert("Please fill all fields");
    return;
  }

  coursework.push({ subject, members, dueDate, status });
  displayCoursework();
}

function displayCoursework() {
  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  coursework.forEach((c, index) => {
    let statusClass = "";

    if (c.status === "In Progress") statusClass = "status-progress";
    else if (c.status === "In Review") statusClass = "status-review";
    else if (c.status === "Completed") statusClass = "status-complete";

    table.innerHTML += `
      <tr>
        <td>${c.subject}</td>
        <td>${c.members}</td>
        <td>${c.dueDate}</td>
        <td class="${statusClass}">${c.status}</td>
        <td>
          <button class="delete-btn" onclick="deleteCoursework(${index})">Delete</button>
        </td>
      </tr>
    `;
  });
}

function deleteCoursework(index) {
  coursework.splice(index, 1);
  displayCoursework();
}

function logout() {
  window.location.href = "login1.html";
}
</script>

</body>
</html>
